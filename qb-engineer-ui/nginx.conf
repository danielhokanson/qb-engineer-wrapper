server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ────────────────────────────────────────────────────
    # Applied on all responses served directly by nginx (not proxied API/DocuSeal).
    # DocuSeal is proxied through /docuseal/ — its responses get separate header
    # treatment in that location block.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP: DocuSeal JS + form content are proxied through same origin (/docuseal/),
    # so 'self' covers both. SignalR uses wss: for WebSocket upgrades.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-hashes'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' ws: wss: https://api.github.com; frame-src 'self'; frame-ancestors 'none';" always;

    # SPA fallback — never cache index.html so browsers always get fresh asset filenames
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # API proxy
    location /api/ {
        client_max_body_size 100m;
        proxy_pass http://qb-engineer-api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # SignalR hub proxy (WebSocket)
    location /hubs/ {
        proxy_pass http://qb-engineer-api:8080/hubs/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # DocuSeal proxy — same-origin embedding of document signing forms.
    # DocuSeal is internal-only (qb-engineer-signing:3000); this proxy is the
    # sole browser-reachable path. The client-side JS embed and signing form
    # are both served from /docuseal/, keeping them same-origin with the app.
    #
    # Uses a variable for proxy_pass so nginx defers DNS resolution to request time.
    # This allows the container to start even when qb-engineer-signing is not running.
    location /docuseal/ {
        resolver 127.0.0.11 valid=30s;
        set $docuseal http://qb-engineer-signing:3000;
        proxy_pass $docuseal/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Strip DocuSeal's own clickjacking headers — we embed it intentionally
        # through this same-origin proxy, so DocuSeal's DENY would block itself.
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
