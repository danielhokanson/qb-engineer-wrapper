<mat-form-field appearance="outline">
  <mat-label>{{ label() }}</mat-label>
  <input matInput
    [matDatepicker]="picker"
    [min]="min()"
    [max]="max()"
    [disabled]="disabled()"
    [value]="value()"
    (dateChange)="onDateChange($event.value)"
    (blur)="markTouched()" />
  <mat-datepicker-toggle matSuffix [for]="picker" />
  <mat-datepicker #picker />
</mat-form-field>
