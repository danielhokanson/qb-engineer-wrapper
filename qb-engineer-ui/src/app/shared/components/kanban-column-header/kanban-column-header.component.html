<div class="col-header" [class.col-header--over-wip]="isOverWip()" [style.border-top-color]="color()">
  <button class="col-header__collapse" (click)="collapseToggled.emit()" title="Toggle column">
    <span class="material-icons-outlined">
      {{ collapsed() ? 'chevron_right' : 'expand_more' }}
    </span>
  </button>
  <span class="col-header__name">{{ name() }}</span>
  <span class="col-header__count">{{ count() }}</span>
  @if (wipLimit() !== null) {
    <span class="col-header__wip" [class.col-header__wip--warn]="isOverWip()">
      / {{ wipLimit() }}
    </span>
  }
  @if (isIrreversible()) {
    <span class="col-header__lock" title="Irreversible — jobs cannot be moved backward">
      <span class="material-icons-outlined col-header__lock-icon">lock</span>
    </span>
  }
</div>
