<div class="page-layout">
  <div class="page-layout__header">
    <div class="page-layout__title-group">
      <span class="page-layout__title">{{ pageTitle() }}</span>
      @if (pageSubtitle()) {
        <span class="page-layout__subtitle">{{ pageSubtitle() }}</span>
      }
    </div>
    @if (helpTourId()) {
      <button class="icon-btn page-layout__help" title="Page help tour" (click)="startTour()">
        <span class="material-icons-outlined">help_outline</span>
      </button>
    }
    <span class="page-layout__spacer"></span>
    <ng-content select="[toolbar]" />
  </div>

  <div class="page-layout__content">
    <ng-content select="[content]" />
  </div>

  <div class="page-layout__actions">
    <ng-content select="[actions]" />
  </div>
</div>
