@if (shortcuts.helpOpen()) {
  <div class="shortcuts-backdrop" role="button" tabindex="0" aria-label="Close" (click)="shortcuts.closeHelp()" (keydown.enter)="shortcuts.closeHelp()"></div>
  <div class="shortcuts-dialog">
    <div class="shortcuts-dialog__header">
      <h2>Keyboard Shortcuts</h2>
      <button class="icon-btn" aria-label="Close" (click)="shortcuts.closeHelp()">
        <span class="material-icons-outlined">close</span>
      </button>
    </div>
    <div class="shortcuts-dialog__body">
      @for (group of groups(); track group.context) {
        <div class="shortcuts-group">
          <h3 class="shortcuts-group__title">{{ group.context }}</h3>
          @for (shortcut of group.shortcuts; track shortcut.key) {
            <div class="shortcuts-group__item">
              <span class="shortcuts-group__description">{{ shortcut.description }}</span>
              <kbd class="shortcuts-group__key">{{ formatKey(shortcut) }}</kbd>
            </div>
          }
        </div>
      }
    </div>
  </div>
}
