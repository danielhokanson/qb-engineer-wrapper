<div class="dialog-backdrop" role="button" tabindex="0" [attr.aria-label]="'shared.closeDialog' | translate" (click)="tryClose()" (keydown.enter)="tryClose()">
  <div class="dialog" role="dialog" aria-modal="true" [attr.aria-label]="title()" [style.width]="width()" [class.dialog--split]="splitLayout()" (click)="$event.stopPropagation()" (keydown)="$event.stopPropagation()">
    <div class="dialog__header">
      <span class="dialog__title">{{ title() }}</span>
      <button class="icon-btn" [attr.aria-label]="'shared.closeDialog' | translate" [matTooltip]="'shared.closeDialog' | translate" matTooltipPosition="above" (click)="tryClose()">
        <span class="material-icons-outlined">close</span>
      </button>
    </div>
    <div class="dialog__body">
      <ng-content />
    </div>
    <div class="dialog__footer">
      <ng-content select="[dialog-footer]" />
    </div>
  </div>
</div>
