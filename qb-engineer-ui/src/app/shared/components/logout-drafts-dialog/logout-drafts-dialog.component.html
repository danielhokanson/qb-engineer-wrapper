<div class="dialog-backdrop" role="button" tabindex="0" aria-label="Cancel" (click)="cancel()" (keydown.enter)="cancel()">
  <div class="dialog" role="dialog" aria-modal="true" aria-label="Unsaved work" style="width: 520px" (click)="$event.stopPropagation()" (keydown)="$event.stopPropagation()">
    <div class="dialog__header">
      <span class="dialog__title">Unsaved Work</span>
      <button class="icon-btn" aria-label="Cancel" (click)="cancel()">
        <span class="material-icons-outlined">close</span>
      </button>
    </div>

    <div class="dialog__body">
      <p class="logout-drafts__description">
        You have unsaved changes. They will be preserved for when you return.
      </p>

      <div class="logout-drafts__list">
        @for (draft of data.drafts; track draft.key) {
          <div class="logout-drafts__item">
            <div class="logout-drafts__item-info">
              <span class="logout-drafts__item-label">{{ draft.displayLabel }}</span>
              <span class="logout-drafts__item-time">{{ draft.lastModified | date:'MM/dd/yyyy hh:mm a' }}</span>
            </div>
            <button class="action-btn action-btn--sm" aria-label="Go to {{ draft.displayLabel }}" (click)="navigateTo(draft)">
              <span class="material-icons-outlined">open_in_new</span>
              Go to
            </button>
          </div>
        }
      </div>
    </div>

    <div class="dialog__footer">
      <button class="action-btn" (click)="cancel()">Cancel</button>
      <button class="action-btn action-btn--primary" (click)="logout()">Logout Anyway</button>
    </div>
  </div>
</div>
