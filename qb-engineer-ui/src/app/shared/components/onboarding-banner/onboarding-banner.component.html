@if (visible()) {
  <div class="onboarding-banner" role="alert" aria-live="polite">
    <span class="material-icons-outlined onboarding-banner__icon">warning</span>
    <span class="onboarding-banner__text">
      Complete your employee profile &mdash;
      @if (incompleteCount() > 0) {
        {{ incompleteCount() }} {{ incompleteCount() === 1 ? 'item' : 'items' }} remaining
      } @else {
        action required
      }
    </span>
    <button class="action-btn action-btn--sm onboarding-banner__action" (click)="goToIncomplete()">
      Complete Now
    </button>
    <button class="icon-btn onboarding-banner__dismiss" (click)="dismiss()" aria-label="Dismiss onboarding banner">
      <span class="material-icons-outlined">close</span>
    </button>
  </div>
}
