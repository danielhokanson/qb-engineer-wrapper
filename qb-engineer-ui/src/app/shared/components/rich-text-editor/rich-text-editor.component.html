@if (label()) {
  <span class="rich-text-editor__label" id="rich-text-label">{{ label() }}</span>
}
<quill-editor
  [formControl]="editorControl"
  [modules]="modules"
  [placeholder]="placeholder()"
  [readOnly]="isDisabled()"
  [styles]="{ height: height() }"
  [attr.aria-labelledby]="label() ? 'rich-text-label' : null"
  (onContentChanged)="onContentChanged($event)"
  (onBlur)="onBlur()"
  theme="snow" />
