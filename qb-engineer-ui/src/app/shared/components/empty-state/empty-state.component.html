<div class="empty-state">
  <span class="material-icons-outlined empty-state__icon">{{ icon() }}</span>
  <p class="empty-state__message">{{ message() }}</p>
  @if (helpText()) {
    <p class="empty-state__help">{{ helpText() }}</p>
  }
  @if (actionLabel()) {
    <button class="empty-state__action" (click)="action.emit()">{{ actionLabel() }}</button>
  }
</div>
