<fieldset class="address-form" [class.address-form--compact]="compact()">
  <div [formGroup]="form" class="address-form__fields">
    <app-input label="Street Address" formControlName="line1" [maxlength]="200" [required]="requireLine1()" />

    @if (showLine2()) {
      <app-input label="Street Address 2" formControlName="line2" placeholder="Apt, Suite, Unit" [maxlength]="200" [required]="requireLine2()" />
    }

    <div class="address-form__row">
      <app-input label="City" formControlName="city" [maxlength]="100" [required]="requireCity()" />

      @if (stateDropdown()) {
        <app-select label="State" formControlName="state" [options]="stateOptions" [required]="requireState()" />
      } @else {
        <app-input label="State / Province" formControlName="state" [maxlength]="50" [required]="requireState()" />
      }
    </div>

    <div class="address-form__row">
      <app-input label="ZIP / Postal Code" formControlName="postalCode" mask="zip" [maxlength]="20" [required]="requirePostalCode()" />

      @if (fixedCountry()) {
        <app-input label="Country" formControlName="country" [isReadonly]="true" />
      } @else {
        <app-select label="Country" formControlName="country" [options]="countryOptions" [required]="requireCountry()" />
      }
    </div>
  </div>

  @if (showVerify()) {
    <div class="address-form__verify">
      <button class="action-btn action-btn--sm"
        type="button"
        [disabled]="verifying() || !form.controls.line1.value || !form.controls.city.value"
        aria-label="Verify address"
        (click)="verify()">
        @if (verifying()) {
          <span class="material-icons-outlined address-form__spinner">sync</span>
          Verifying...
        } @else if (verified()) {
          <span class="material-icons-outlined address-form__verified-icon">check_circle</span>
          Verified
        } @else {
          <span class="material-icons-outlined">location_searching</span>
          Verify Address
        }
      </button>

      @if (verifyResult(); as result) {
        <div class="address-form__verify-result" [class.address-form__verify-result--valid]="result.isValid" [class.address-form__verify-result--invalid]="!result.isValid">
          @if (result.isValid) {
            <span class="material-icons-outlined">check_circle</span>
            <span>Address verified</span>
          } @else {
            <span class="material-icons-outlined">warning</span>
            <span>{{ result.messages[0] ?? 'Could not verify address' }}</span>
          }
        </div>
      }
    </div>
  }
</fieldset>
