<div class="page-header">
  <div class="page-header__title-group">
    <span class="page-header__title">{{ title() }}</span>
    @if (subtitle()) {
      <span class="page-header__subtitle">{{ subtitle() }}</span>
    }
  </div>
  @if (helpTourId()) {
    <button class="icon-btn page-header__help" [matTooltip]="'shared.helpTour' | translate" matTooltipPosition="above" [attr.aria-label]="'shared.startHelpTour' | translate" (click)="startTour()">
      <span class="material-icons-outlined">help_outline</span>
    </button>
  }
  <span class="page-header__spacer"></span>
  <ng-content />
</div>
