<header class="app-header">
  <div class="app-header__logo">QB<span>:</span>Eng</div>
  <div class="header-sep"></div>
  <nav class="breadcrumb">
    <span>Home</span>
    <span class="material-icons-outlined" style="font-size: 14px">chevron_right</span>
    <span class="breadcrumb__current">Dashboard</span>
  </nav>

  <div class="app-header__search" [class.app-header__search--focused]="searchFocused()">
    <span class="material-icons-outlined search-icon">search</span>
    <input class="search-input" type="text" placeholder="Search jobs, parts, people..."
           [formControl]="searchControl" (focus)="onSearchFocus()" (blur)="onSearchBlur()" />
    <kbd>Ctrl+K</kbd>

    @if (showResults()) {
      <div class="search-results">
        @for (result of searchResults(); track result.entityId + result.entityType) {
          <button class="search-result" (mousedown)="navigateToResult(result)">
            <span class="material-icons-outlined search-result__icon">{{ result.icon }}</span>
            <div class="search-result__content">
              <span class="search-result__title">{{ result.title }}</span>
              @if (result.subtitle) {
                <span class="search-result__subtitle">{{ result.subtitle }}</span>
              }
            </div>
            <span class="search-result__type">{{ result.entityType }}</span>
          </button>
        }
      </div>
    }
  </div>

  <div class="app-header__actions">
    <button class="icon-btn" title="Chat">
      <span class="material-icons-outlined">chat_bubble_outline</span>
      <span class="badge">2</span>
    </button>
    <button class="icon-btn" title="Notifications" (click)="toggleNotifications()">
      <span class="material-icons-outlined">notifications_none</span>
      @if (unreadCount() > 0) {
        <span class="badge">{{ unreadCount() }}</span>
      }
    </button>
    <button class="icon-btn" title="Toggle theme" (click)="toggleTheme()">
      <span class="material-icons-outlined">{{ themeIcon() }}</span>
    </button>
    <div class="app-header__avatar">DH</div>
  </div>
</header>

@if (panelOpen()) {
  <div class="notification-backdrop" (click)="toggleNotifications()"></div>
  <app-notification-panel />
}
