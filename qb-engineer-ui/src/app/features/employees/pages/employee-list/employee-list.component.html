<app-page-header [title]="'employees.title' | translate" [subtitle]="'employees.subtitle' | translate">
</app-page-header>

<div class="employees-layout">
  <div class="filters-bar">
    <app-input [label]="'employees.search' | translate" [formControl]="searchControl"
      [placeholder]="'employees.searchPlaceholder' | translate"
      (keyup.enter)="applyFilters()" />
    <app-select [label]="'employees.role' | translate" [formControl]="roleControl" [options]="roleOptions()"
      (selectionChange)="applyFilters()" />
    <app-select [label]="'employees.status' | translate" [formControl]="statusControl" [options]="statusOptions"
      (selectionChange)="applyFilters()" />
  </div>

  <div [appLoadingBlock]="loading()">
    <app-data-table
      tableId="employees-list"
      [columns]="columns()"
      [data]="employees()"
      emptyIcon="badge"
      [emptyMessage]="'employees.noEmployees' | translate"
      [clickableRows]="true"
      (rowClick)="selectEmployee($any($event))">

      <ng-template appColumnCell="name" let-row>
        <div class="employee-name-cell">
          <app-avatar [initials]="row.initials ?? ''" [color]="row.avatarColor ?? ''" size="sm" />
          <span>{{ formatName(row) }}</span>
        </div>
      </ng-template>
      <ng-template appColumnCell="isActive" let-row>
        <span [class]="row.isActive ? 'chip chip--success' : 'chip chip--muted'">
          {{ (row.isActive ? 'employees.filters.active' : 'employees.filters.inactive') | translate }}
        </span>
      </ng-template>
      <ng-template appColumnCell="startDate" let-row>
        <span class="text-muted">{{ row.startDate | date:'MM/dd/yyyy' }}</span>
      </ng-template>
      <ng-template appColumnCell="teamName" let-row>
        <span class="text-muted">{{ row.teamName ?? '—' }}</span>
      </ng-template>
      <ng-template appColumnCell="jobTitle" let-row>
        <span class="text-muted">{{ row.jobTitle ?? '—' }}</span>
      </ng-template>
      <ng-template appColumnCell="phone" let-row>
        <span class="text-muted">{{ row.phone ?? '—' }}</span>
      </ng-template>
    </app-data-table>
  </div>
</div>
