<app-dialog [title]="dialogTitle()" width="520px" (closed)="close()">
  <div [formGroup]="form">
    <app-input [label]="'planning.cycleName' | translate" formControlName="name" [placeholder]="'planning.cycleNamePlaceholder' | translate" />

    <div class="dialog-row">
      <app-datepicker [label]="'common.startDate' | translate" formControlName="startDate" />
      <app-datepicker [label]="'common.endDate' | translate" formControlName="endDate" />
    </div>

    <app-textarea [label]="'planning.goals' | translate" formControlName="goals" [rows]="3" />
  </div>

  <div dialog-footer>
    <button class="action-btn" (click)="close()">{{ 'common.cancel' | translate }}</button>
    <button class="action-btn action-btn--primary"
      [appValidationPopover]="violations"
      [disabled]="form.invalid || saving()"
      (click)="save()">
      @if (saving()) {
        <span class="material-icons-outlined spin">sync</span>
      } @else {
        <span class="material-icons-outlined">save</span>
      }
      {{ isEditMode() ? ('planning.update' | translate) : ('common.create' | translate) }}
    </button>
  </div>
</app-dialog>
