@if (error()) {
  <div class="page-error">
    <span class="material-icons-outlined page-error__icon">error_outline</span>
    <p>{{ error() }}</p>
  </div>
} @else if (data(); as d) {
  <app-page-header title="Dashboard">
    <span class="page-header__ctx">Production · March 2026</span>
    <div class="page-header__actions">
      <button class="btn" (click)="ambientMode.set(true)" title="Ambient display mode">
        <span class="material-icons-outlined btn__icon">nightlight</span> Ambient
      </button>
      <button class="btn" (click)="exportDashboard()">
        <span class="material-icons-outlined btn__icon">download</span> Export
      </button>
    </div>
  </app-page-header>

  <div class="page-content">
    <app-dashboard-widget
      title="Today's Tasks"
      icon="today"
      [count]="d.tasks.length"
      widgetKey="todays-tasks"
      [accent]="true"
      class="today-section">
      <app-todays-tasks-widget [tasks]="d.tasks" />
    </app-dashboard-widget>

    <div class="content-grid">
      <div class="kpi-stack">
        <app-kpi-chip
          [value]="'' + d.kpis.activeCount"
          label="Active"
          [change]="d.kpis.activeChange > 0 ? '+' + d.kpis.activeChange : '' + d.kpis.activeChange"
          changeDirection="up" />
        <app-kpi-chip
          [value]="'' + d.kpis.overdueCount"
          valueColor="warn"
          label="Overdue"
          [change]="d.kpis.overdueChange > 0 ? '+' + d.kpis.overdueChange : '' + d.kpis.overdueChange"
          changeDirection="down" />
        <app-kpi-chip
          [value]="d.kpis.totalHours"
          label="Hours"
          [change]="d.kpis.hoursStatus"
          changeDirection="up" />
      </div>

      <app-dashboard-widget title="Jobs by Stage" widgetKey="jobs-by-stage">
        <app-jobs-by-stage-widget [stages]="d.stages" />
      </app-dashboard-widget>

      <app-dashboard-widget title="Team Load" widgetKey="team-load">
        <app-team-load-widget [team]="d.team" />
      </app-dashboard-widget>

      <app-dashboard-widget title="Activity" widgetKey="activity" class="span-2">
        <app-activity-widget [entries]="d.activity" />
      </app-dashboard-widget>

      <app-dashboard-widget title="Deadlines" widgetKey="deadlines">
        <app-deadlines-widget [deadlines]="d.deadlines" />
      </app-dashboard-widget>

      <app-dashboard-widget title="Planning Cycle" icon="event_note" widgetKey="planning-cycle">
        <app-cycle-progress-widget />
      </app-dashboard-widget>

      <app-dashboard-widget title="Open Orders" icon="shopping_cart" widgetKey="open-orders">
        <app-open-orders-widget />
      </app-dashboard-widget>

      <app-dashboard-widget title="End of Day" icon="nightlight" widgetKey="eod-prompt">
        <app-eod-prompt-widget />
      </app-dashboard-widget>

      <app-dashboard-widget title="Margin (30d)" icon="trending_up" widgetKey="margin-summary">
        <app-margin-summary-widget />
      </app-dashboard-widget>
    </div>
  </div>

  @if (ambientMode()) {
    <app-ambient-mode (exit)="ambientMode.set(false)" />
  }
}
