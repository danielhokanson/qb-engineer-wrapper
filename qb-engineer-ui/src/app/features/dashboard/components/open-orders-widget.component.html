@if (summary(); as s) {
  <div class="orders-summary">
    <div class="orders-stat">
      <span class="orders-stat__value">{{ s.totalOrders }}</span>
      <span class="orders-stat__label">Open Orders</span>
    </div>
    <div class="orders-breakdown">
      <div class="orders-breakdown__row">
        <span class="orders-breakdown__label">Confirmed</span>
        <span class="orders-breakdown__count">{{ s.confirmedCount }}</span>
      </div>
      <div class="orders-breakdown__row">
        <span class="orders-breakdown__label">In Production</span>
        <span class="orders-breakdown__count">{{ s.inProductionCount }}</span>
      </div>
      <div class="orders-breakdown__row">
        <span class="orders-breakdown__label">Partially Shipped</span>
        <span class="orders-breakdown__count">{{ s.partiallyShippedCount }}</span>
      </div>
    </div>
    <a routerLink="/sales-orders" class="orders-link">View All Orders →</a>
  </div>
}
