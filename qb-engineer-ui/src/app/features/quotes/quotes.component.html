<app-page-header [title]="'quotes.title' | translate" [subtitle]="'quotes.subtitle' | translate">
  <button data-testid="new-quote-btn" class="action-btn action-btn--primary" (click)="openCreateDialog()">
    <span class="material-icons-outlined">add</span>
    {{ 'quotes.newQuote' | translate }}
  </button>
</app-page-header>

<div class="qt-layout">
  <div class="qt-list-panel">
    <div class="filters-bar">
      <app-input [label]="'common.search' | translate" [formControl]="searchControl" [placeholder]="'quotes.searchPlaceholder' | translate"
        (keyup.enter)="applyFilters()" />
      <app-select [label]="'common.status' | translate" [formControl]="statusFilterControl" [options]="statusOptions" />
    </div>

    <div [appLoadingBlock]="loading()">
      <app-data-table tableId="quotes" [columns]="quoteColumns" [data]="quotes()"
        emptyIcon="request_quote" [emptyMessage]="'quotes.noQuotesFound' | translate"
        [clickableRows]="true"
        (rowClick)="openQuoteDetail($any($event))">
        <ng-template appColumnCell="quoteNumber" let-row>
          <span class="qt-number">{{ row.quoteNumber }}</span>
        </ng-template>
        <ng-template appColumnCell="status" let-row>
          <span [class]="getStatusClass(row.status)">{{ getStatusLabel(row.status) }}</span>
        </ng-template>
        <ng-template appColumnCell="total" let-row>
          <span>{{ row.total | currency }}</span>
        </ng-template>
        <ng-template appColumnCell="expirationDate" let-row>
          <span class="text-muted">{{ row.expirationDate ? (row.expirationDate | date:'MM/dd/yyyy') : '---' }}</span>
        </ng-template>
        <ng-template appColumnCell="createdAt" let-row>
          <span class="text-muted">{{ row.createdAt | date:'MM/dd/yyyy' }}</span>
        </ng-template>
      </app-data-table>
    </div>
  </div>
</div>

@if (showCreateDialog()) {
  <app-quote-dialog (closed)="closeCreateDialog()" (saved)="onCreateSaved()" />
}
