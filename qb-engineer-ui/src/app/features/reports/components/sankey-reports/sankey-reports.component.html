<app-page-header [title]="'reports.sankey.title' | translate" [subtitle]="'reports.sankey.subtitle' | translate" helpTourId="sankey-reports">
  <button class="action-btn action-btn--sm" (click)="goBack()" aria-label="Back to reports">
    <span class="material-icons-outlined">arrow_back</span>
    {{ 'reports.sankey.backToReports' | translate }}
  </button>
</app-page-header>

<div class="reports-layout">
  <aside class="reports-sidebar">
    @for (report of reports; track report.id) {
      <button class="report-nav-item"
              [class.report-nav-item--active]="activeReport() === report.id"
              (click)="selectReport(report.id)"
              [attr.aria-label]="report.label">
        <span class="material-icons-outlined report-nav-item__icon">{{ report.icon }}</span>
        <span class="report-nav-item__label">{{ report.label }}</span>
      </button>
    }
  </aside>

  <main class="reports-main">
    <div class="report-header">
      <h2 class="report-header__title">{{ activeReportDef().label }}</h2>

      @if (activeReportDef().needsDateRange) {
        <div class="report-header__filters">
          <app-datepicker [label]="'reports.from' | translate" [formControl]="startControl" />
          <app-datepicker [label]="'reports.to' | translate" [formControl]="endControl" />
          <button class="action-btn action-btn--primary action-btn--sm" (click)="loadReport()">{{ 'reports.apply' | translate }}</button>
        </div>
      }
    </div>

    @if (loading()) {
      <div class="page-loading">
        <span class="material-icons-outlined spin">sync</span>
        {{ 'reports.loadingReport' | translate }}
      </div>
    } @else {
      <app-sankey-chart [data]="flowData()" [height]="500" />
    }
  </main>
</div>
