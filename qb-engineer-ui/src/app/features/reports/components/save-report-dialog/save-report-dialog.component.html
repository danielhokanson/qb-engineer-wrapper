<app-dialog [title]="'reports.saveReportTitle' | translate" width="420px" (closed)="close()">
  <div [formGroup]="form">
    <app-input [label]="'reports.reportName' | translate" formControlName="name" />
    <app-textarea [label]="'common.description' | translate" formControlName="description" [rows]="3" />
    <app-toggle [label]="'reports.shareWithTeam' | translate" formControlName="isShared" />
  </div>

  <div dialog-footer>
    <button class="action-btn" (click)="close()">{{ 'common.cancel' | translate }}</button>
    <button class="action-btn action-btn--primary"
      [appValidationPopover]="violations"
      [disabled]="form.invalid"
      (click)="save()">
      {{ 'reports.saveReport' | translate }}
    </button>
  </div>
</app-dialog>
