<div class="mobile-page">
  <div class="profile-header">
    <app-avatar
      [initials]="user()?.initials ?? ''"
      [color]="user()?.avatarColor ?? '#6366f1'"
      size="lg" />
    <div class="profile-header__info">
      <h2 class="profile-header__name">{{ user()?.lastName }}, {{ user()?.firstName }}</h2>
      <p class="profile-header__email">{{ user()?.email }}</p>
    </div>
  </div>

  <div class="account-section">
    <span class="account-section__label">Quick Settings</span>
    <button class="account-link" (click)="toggleTheme()" aria-label="Toggle theme">
      <span class="material-icons-outlined">{{ theme() === 'dark' ? 'light_mode' : 'dark_mode' }}</span>
      <span>{{ theme() === 'dark' ? 'Light Mode' : 'Dark Mode' }}</span>
      <span class="material-icons-outlined account-link__chevron">chevron_right</span>
    </button>
  </div>

  <div class="account-section">
    <span class="account-section__label">Account</span>
    <nav class="account-links" aria-label="Account settings">
      <a class="account-link" routerLink="/account/profile">
        <span class="material-icons-outlined">person</span>
        <span>Profile</span>
        <span class="material-icons-outlined account-link__chevron">chevron_right</span>
      </a>
      <a class="account-link" routerLink="/account/integrations">
        <span class="material-icons-outlined">extension</span>
        <span>Integrations</span>
        <span class="material-icons-outlined account-link__chevron">chevron_right</span>
      </a>
      <a class="account-link" routerLink="/account/security">
        <span class="material-icons-outlined">lock</span>
        <span>Security</span>
        <span class="material-icons-outlined account-link__chevron">chevron_right</span>
      </a>
      <a class="account-link" routerLink="/account/customization">
        <span class="material-icons-outlined">palette</span>
        <span>Customization</span>
        <span class="material-icons-outlined account-link__chevron">chevron_right</span>
      </a>
      <a class="account-link" routerLink="/onboarding">
        <span class="material-icons-outlined">school</span>
        <span>Setup Wizard</span>
        <span class="material-icons-outlined account-link__chevron">chevron_right</span>
      </a>
    </nav>
  </div>

  <div class="account-footer">
    <button class="action-btn" (click)="openDesktop()" aria-label="Open desktop view">
      <span class="material-icons-outlined">desktop_windows</span>
      Open Desktop View
    </button>
    <button class="action-btn action-btn--danger" (click)="logout()" aria-label="Log out">
      <span class="material-icons-outlined">logout</span>
      Log Out
    </button>
  </div>
</div>
