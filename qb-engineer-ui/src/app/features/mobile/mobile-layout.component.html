<div class="mobile-layout">
  <header class="mobile-header">
    <span class="mobile-header__logo">QB Engineer</span>
    <button class="mobile-header__action" aria-label="Notifications"
            routerLink="/m/notifications">
      <span class="material-icons-outlined">notifications</span>
    </button>
  </header>

  <main class="mobile-content">
    <router-outlet />
  </main>

  <nav class="mobile-nav" aria-label="Mobile navigation">
    @for (tab of tabs(); track tab.path) {
      <a class="mobile-nav__tab"
         [routerLink]="tab.path"
         routerLinkActive="mobile-nav__tab--active"
         [attr.aria-label]="tab.label">
        <span class="material-icons-outlined mobile-nav__icon">{{ tab.icon }}</span>
        <span class="mobile-nav__label">{{ tab.label }}</span>
      </a>
    }
  </nav>
</div>
