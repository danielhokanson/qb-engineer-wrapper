<div class="mobile-layout">
  <header class="mobile-header">
    <span class="mobile-header__logo">QB Engineer</span>
    <button class="mobile-header__action" aria-label="Notifications"
            routerLink="/m/notifications">
      <span class="material-icons-outlined">notifications</span>
    </button>
  </header>

  <main class="mobile-content">
    @if (!isClockedIn() && clockCheckDone()) {
      <div class="clock-gate-banner">
        <span class="material-icons-outlined clock-gate-banner__icon">schedule</span>
        <span class="clock-gate-banner__text">Clock in to access all features</span>
      </div>
    }
    <router-outlet />
  </main>

  <nav class="mobile-nav" aria-label="Mobile navigation">
    @for (tab of tabs(); track tab.path) {
      @if (tab.isScan) {
        <a class="mobile-nav__tab mobile-nav__tab--scan"
           [routerLink]="tab.path"
           routerLinkActive="mobile-nav__tab--active"
           [class.mobile-nav__tab--disabled]="isTabDisabled(tab)"
           [attr.aria-label]="tab.label"
           [attr.aria-disabled]="isTabDisabled(tab)"
           (click)="onTabClick($event, tab)">
          <span class="mobile-nav__scan-ring">
            <span class="material-icons-outlined mobile-nav__icon mobile-nav__icon--scan">{{ tab.icon }}</span>
          </span>
          <span class="mobile-nav__label">{{ tab.label }}</span>
        </a>
      } @else {
        <a class="mobile-nav__tab"
           [routerLink]="tab.path"
           routerLinkActive="mobile-nav__tab--active"
           [class.mobile-nav__tab--disabled]="isTabDisabled(tab)"
           [attr.aria-label]="tab.label"
           [attr.aria-disabled]="isTabDisabled(tab)"
           (click)="onTabClick($event, tab)">
          <span class="material-icons-outlined mobile-nav__icon">{{ tab.icon }}</span>
          <span class="mobile-nav__label">{{ tab.label }}</span>
        </a>
      }
    }
  </nav>
</div>
