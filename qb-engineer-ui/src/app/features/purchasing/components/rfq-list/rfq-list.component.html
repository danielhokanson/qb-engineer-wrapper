<div [appLoadingBlock]="loading()">
  <app-data-table tableId="rfq-list" [columns]="rfqColumns" [data]="data()"
    emptyIcon="request_quote" [emptyMessage]="'purchasing.noRfqs' | translate"
    [clickableRows]="true" (rowClick)="onRowClick($event)">
    <ng-template appColumnCell="rfqNumber" let-row>
      <span class="rfq-number">{{ row.rfqNumber }}</span>
    </ng-template>
    <ng-template appColumnCell="status" let-row>
      <span [class]="getStatusClass(row.status)">{{ getStatusLabel(row.status) }}</span>
    </ng-template>
    <ng-template appColumnCell="requiredDate" let-row>
      <span class="text-muted">{{ row.requiredDate | date:'MM/dd/yyyy' }}</span>
    </ng-template>
    <ng-template appColumnCell="responseDeadline" let-row>
      <span class="text-muted">{{ row.responseDeadline ? (row.responseDeadline | date:'MM/dd/yyyy') : '—' }}</span>
    </ng-template>
    <ng-template appColumnCell="createdAt" let-row>
      <span class="text-muted">{{ row.createdAt | date:'MM/dd/yyyy' }}</span>
    </ng-template>
  </app-data-table>
</div>
