<app-dialog [title]="'Send Announcement'" width="520px" (closed)="close()">
  <div [formGroup]="form">
    <app-select label="Template" formControlName="templateId" [options]="templateOptions()" />
    <app-input label="Title" formControlName="title" [required]="true" [maxlength]="200" />
    <app-textarea label="Content" formControlName="content" [required]="true" [rows]="4" [maxlength]="5000" />
    <div class="dialog-row">
      <app-select label="Severity" formControlName="severity" [options]="severityOptions" [required]="true" />
      <app-select label="Scope" formControlName="scope" [options]="scopeOptions" [required]="true" />
    </div>
    @if (showTeamSelector()) {
      <app-select label="Target Teams" formControlName="targetTeamIds" [options]="teamOptions()" [multiple]="true" [required]="true" />
    }
    <div class="dialog-row">
      <app-datepicker label="Expires At" formControlName="expiresAt" />
      <app-toggle label="Require Acknowledgment" formControlName="requiresAcknowledgment" />
    </div>
  </div>

  <div dialog-footer>
    <button class="action-btn" (click)="close()">{{ 'shared.cancel' | translate }}</button>
    <button class="action-btn action-btn--primary"
      [appValidationPopover]="violations"
      [disabled]="form.invalid || saving()"
      (click)="save()">
      <span class="material-icons-outlined">campaign</span>
      {{ 'shared.send' | translate }}
    </button>
  </div>
</app-dialog>
