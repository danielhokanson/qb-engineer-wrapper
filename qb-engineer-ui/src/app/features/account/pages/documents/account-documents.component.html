<div class="account-page">
  <h1 class="account-page__title">
    <span class="material-icons-outlined">folder</span>
    {{ 'account.myDocuments' | translate }}
  </h1>

  <div class="account-page__card">
    <p class="documents__intro">{{ 'account.documentsIntro' | translate }}</p>

    <app-file-upload-zone
      entityType="employee-docs"
      [entityId]="userId()"
      accept=".pdf,.jpg,.jpeg,.png,.doc,.docx"
      [maxSizeMb]="25" />
  </div>
</div>
