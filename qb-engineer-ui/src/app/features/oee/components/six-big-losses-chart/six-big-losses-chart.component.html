<div class="six-big-losses">
  @if (data().totalLossMinutes > 0) {
    <div class="six-big-losses__total">
      {{ 'oee.totalLoss' | translate }}: <strong>{{ data().totalLossMinutes | number:'1.0-0' }} {{ 'oee.min' | translate }}</strong>
      ({{ (data().totalLossMinutes / 60) | number:'1.1-1' }} {{ 'oee.hrs' | translate }})
    </div>
    <div class="six-big-losses__chart">
      <canvas baseChart
        [type]="chartConfig().type"
        [data]="chartConfig().data"
        [options]="chartConfig().options"
        [attr.aria-label]="'oee.lossesChartLabel' | translate">
      </canvas>
    </div>
  } @else {
    <div class="six-big-losses__empty">
      <span class="material-icons-outlined">check_circle</span>
      <span>{{ 'oee.noLosses' | translate }}</span>
    </div>
  }
</div>
