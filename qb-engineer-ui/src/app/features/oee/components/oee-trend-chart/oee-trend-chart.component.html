<div class="oee-trend-chart">
  @if (data().length > 0) {
    <canvas baseChart
      [type]="chartConfig().type"
      [data]="chartConfig().data"
      [options]="chartConfig().options"
      [attr.aria-label]="'oee.trendChartLabel' | translate">
    </canvas>
  } @else {
    <div class="oee-trend-chart__empty">
      <span class="material-icons-outlined">show_chart</span>
      <span>{{ 'oee.noTrendData' | translate }}</span>
    </div>
  }
</div>
