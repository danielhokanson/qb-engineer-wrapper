<app-page-header [title]="'vendors.title' | translate" [subtitle]="'vendors.subtitle' | translate">
  <button class="action-btn action-btn--primary" (click)="openCreateVendor()">
    <span class="material-icons-outlined">add</span>
    {{ 'vendors.newVendor' | translate }}
  </button>
</app-page-header>

<div class="vendors-layout">
  <div class="vendors-list-panel">
    <div class="filters-bar">
      <app-input [label]="'common.search' | translate" [formControl]="searchControl" [placeholder]="'vendors.searchPlaceholder' | translate"
        (keyup.enter)="applyFilters()" />
      <app-select [label]="'common.status' | translate" [formControl]="activeFilterControl" [options]="activeOptions" />
    </div>

    <div [appLoadingBlock]="loading()">
      <app-data-table tableId="vendors" [columns]="vendorColumns" [data]="vendors()"
        emptyIcon="store" [emptyMessage]="'vendors.noVendorsFound' | translate"
        [clickableRows]="true"
        (rowClick)="openVendorDetail($any($event))">
        <ng-template appColumnCell="companyName" let-row>
          <span class="vendor-name">{{ row.companyName }}</span>
        </ng-template>
        <ng-template appColumnCell="contactName" let-row>
          <span class="text-muted">{{ row.contactName ?? '\u2014' }}</span>
        </ng-template>
        <ng-template appColumnCell="email" let-row>
          <span class="text-muted">{{ row.email ?? '\u2014' }}</span>
        </ng-template>
        <ng-template appColumnCell="phone" let-row>
          <span class="text-muted">{{ row.phone ?? '\u2014' }}</span>
        </ng-template>
        <ng-template appColumnCell="isActive" let-row>
          <span [class]="row.isActive ? 'chip chip--success' : 'chip chip--muted'">
            {{ row.isActive ? ('common.active' | translate) : ('common.inactive' | translate) }}
          </span>
        </ng-template>
        <ng-template appColumnCell="createdAt" let-row>
          <span class="text-muted">{{ row.createdAt | date:'MM/dd/yyyy' }}</span>
        </ng-template>
      </app-data-table>
    </div>
  </div>
</div>

<!-- Vendor Create Dialog -->
@if (showDialog()) {
  <app-vendor-dialog
    [vendor]="null"
    (closed)="closeDialog()"
    (saved)="onDialogSaved()" />
}
