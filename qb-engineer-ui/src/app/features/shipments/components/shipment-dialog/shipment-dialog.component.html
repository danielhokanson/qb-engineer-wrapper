<app-dialog [title]="'shipments.newShipmentTitle' | translate" width="800px" (closed)="close()">
  <div [formGroup]="form">
    <div class="dialog-row">
      <app-input [label]="'shipments.salesOrderId' | translate" type="number" formControlName="salesOrderId" />
      <app-input [label]="'shipments.carrier' | translate" formControlName="carrier" [placeholder]="'shipments.optional' | translate" />
    </div>
    <div class="dialog-row">
      <app-input [label]="'shipments.trackingNumber' | translate" formControlName="trackingNumber" [placeholder]="'shipments.optional' | translate" />
      <app-input [label]="'shipments.weight' | translate" type="number" formControlName="weight" [placeholder]="'shipments.optional' | translate" />
      <app-input [label]="'shipments.shippingCost' | translate" type="number" formControlName="shippingCost" [placeholder]="'shipments.optional' | translate" />
    </div>
    <app-textarea [label]="'common.notes' | translate" formControlName="notes" [rows]="2" />
  </div>

  <!-- Line Items -->
  <div class="lines-section">
    <div class="lines-header">
      <span class="lines-title">{{ 'shipments.shipmentLines' | translate }}</span>
    </div>

    @if (lines().length > 0) {
      <table class="lines-table">
        <thead>
          <tr>
            <th>{{ 'shipments.soLineId' | translate }}</th>
            <th>{{ 'common.description' | translate }}</th>
            <th class="lines-table__right">{{ 'shipments.qty' | translate }}</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          @for (line of lines(); track $index) {
            <tr>
              <td class="lines-table__mono">{{ line.salesOrderLineId }}</td>
              <td>{{ line.description }}</td>
              <td class="lines-table__right">{{ line.quantity }}</td>
              <td>
                <button class="icon-btn icon-btn--danger" [matTooltip]="'common.remove' | translate" matTooltipPosition="above" [attr.aria-label]="'common.remove' | translate" (click)="removeLine($index)">
                  <span class="material-icons-outlined">close</span>
                </button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    }

    <!-- Add Line Form -->
    <div class="add-line" [formGroup]="lineForm">
      <app-input [label]="'shipments.soLineId' | translate" type="number" formControlName="salesOrderLineId" />
      <app-input [label]="'common.description' | translate" formControlName="description" />
      <app-input [label]="'shipments.qty' | translate" type="number" formControlName="quantity" />
      <button class="action-btn action-btn--sm" (click)="addLine()" [disabled]="lineForm.invalid">
        <span class="material-icons-outlined">add</span>
        {{ 'common.add' | translate }}
      </button>
    </div>
  </div>

  <div dialog-footer>
    <button class="action-btn" (click)="close()">{{ 'common.cancel' | translate }}</button>
    <button class="action-btn action-btn--primary"
      [appValidationPopover]="violations"
      [disabled]="form.invalid || lines().length === 0 || saving()"
      (click)="save()">
      <span class="material-icons-outlined">save</span> {{ 'shipments.createShipment' | translate }}
    </button>
  </div>
</app-dialog>
