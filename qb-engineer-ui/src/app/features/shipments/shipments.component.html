<app-page-header [title]="'shipments.title' | translate" [subtitle]="'shipments.subtitle' | translate">
  <button class="action-btn action-btn--primary" data-testid="new-shipment-btn" (click)="openCreateDialog()">
    <span class="material-icons-outlined">add</span>
    {{ 'shipments.newShipment' | translate }}
  </button>
</app-page-header>

<div class="sh-layout">
  <div class="sh-list-panel">
    <div class="filters-bar">
      <app-input [label]="'common.search' | translate" [formControl]="searchControl" [placeholder]="'shipments.searchPlaceholder' | translate"
        (keyup.enter)="applyFilters()" />
      <app-select [label]="'common.status' | translate" [formControl]="statusFilterControl" [options]="statusOptions" />
    </div>

    <div [appLoadingBlock]="loading()">
      <app-data-table tableId="shipments" [columns]="shipmentColumns" [data]="shipments()"
        emptyIcon="local_shipping" [emptyMessage]="'shipments.noShipmentsFound' | translate"
        [clickableRows]="true"
        (rowClick)="openShipmentDetail($any($event))">
        <ng-template appColumnCell="shipmentNumber" let-row>
          <span class="sh-number">{{ row.shipmentNumber }}</span>
        </ng-template>
        <ng-template appColumnCell="salesOrderNumber" let-row>
          <span class="sh-number">{{ row.salesOrderNumber }}</span>
        </ng-template>
        <ng-template appColumnCell="status" let-row>
          <span [class]="getStatusClass(row.status)">{{ getStatusLabel(row.status) }}</span>
        </ng-template>
        <ng-template appColumnCell="carrier" let-row>
          <span>{{ row.carrier ?? '---' }}</span>
        </ng-template>
        <ng-template appColumnCell="trackingNumber" let-row>
          <span class="sh-number">{{ row.trackingNumber ?? '---' }}</span>
        </ng-template>
        <ng-template appColumnCell="shippedDate" let-row>
          <span class="text-muted">{{ row.shippedDate ? (row.shippedDate | date:'MM/dd/yyyy') : '---' }}</span>
        </ng-template>
        <ng-template appColumnCell="createdAt" let-row>
          <span class="text-muted">{{ row.createdAt | date:'MM/dd/yyyy' }}</span>
        </ng-template>
      </app-data-table>
    </div>
  </div>
</div>

@if (showCreateDialog()) {
  <app-shipment-dialog (closed)="closeCreateDialog()" (saved)="onCreateSaved()" />
}
