<app-page-header
  [title]="'customerReturns.title' | translate"
  [subtitle]="'customerReturns.subtitle' | translate" />

<div class="page-header">
  <app-input
    label="Search"
    [formControl]="searchControl"
    [attr.aria-label]="'common.search' | translate" />
  <app-select
    label="Status"
    [formControl]="statusFilterControl"
    [options]="statusOptions"
    [attr.aria-label]="'common.status' | translate" />
  <button class="action-btn" (click)="applyFilters()">
    <span class="material-icons-outlined">search</span>
    {{ 'common.filter' | translate }}
  </button>
  <span style="flex:1"></span>
  <button class="action-btn action-btn--primary" (click)="openCreate()"
    [attr.aria-label]="'customerReturns.newReturn' | translate">
    <span class="material-icons-outlined">add</span>
    {{ 'customerReturns.newReturn' | translate }}
  </button>
</div>

<div [appLoadingBlock]="loading()">
  <app-data-table
    tableId="customer-returns"
    [columns]="columns"
    [data]="returns()"
    emptyIcon="assignment_return"
    [emptyMessage]="'customerReturns.noReturns' | translate"
    [clickableRows]="true"
    (rowClick)="openCustomerReturnDetail($event)">

    <ng-template appColumnCell="status" let-row>
      <span [class]="getStatusClass(row.status)">{{ getStatusLabel(row.status) }}</span>
    </ng-template>
  </app-data-table>
</div>

<!-- Create Dialog -->
@if (showCreateDialog()) {
  <app-customer-return-dialog
    [returnDetail]="null"
    (closed)="closeCreate()"
    (saved)="onCreated()" />
}
