<app-page-header
  [title]="'lots.title' | translate"
  [subtitle]="'lots.subtitle' | translate" />

<div class="page-header">
  <app-input
    label="Search lot number or part"
    [formControl]="searchControl"
    [attr.aria-label]="'common.search' | translate" />
  <button class="action-btn" (click)="applySearch()"
    [attr.aria-label]="'common.search' | translate">
    <span class="material-icons-outlined">search</span>
    {{ 'common.search' | translate }}
  </button>
  <span style="flex:1"></span>
  <button class="action-btn action-btn--primary" (click)="openCreate()"
    [attr.aria-label]="'lots.newLot' | translate">
    <span class="material-icons-outlined">add</span>
    {{ 'lots.newLot' | translate }}
  </button>
</div>

<div [appLoadingBlock]="loading()">
  <app-data-table
    tableId="lots"
    [columns]="columns"
    [data]="lots()"
    emptyIcon="inventory_2"
    [emptyMessage]="'lots.noLots' | translate"
    [clickableRows]="true" (rowClick)="openLotDetail($event)">

    <ng-template appColumnCell="lotNumber" let-row>
      <span class="lot-number">{{ row.lotNumber }}</span>
    </ng-template>

    <ng-template appColumnCell="jobNumber" let-row>
      @if (row.jobNumber) {
        <span>{{ row.jobNumber }}</span>
      } @else {
        <span class="text-muted">—</span>
      }
    </ng-template>

    <ng-template appColumnCell="supplierLotNumber" let-row>
      @if (row.supplierLotNumber) {
        <span>{{ row.supplierLotNumber }}</span>
      } @else {
        <span class="text-muted">—</span>
      }
    </ng-template>
  </app-data-table>
</div>

<!-- Create Dialog -->
@if (showCreateDialog()) {
  <app-lot-dialog
    (closed)="closeCreate()"
    (saved)="onCreated()" />
}
