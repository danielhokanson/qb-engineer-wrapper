<div [appLoadingBlock]="loading()">
  <app-data-table
    tableId="approval-inbox"
    [columns]="columns"
    [data]="pending()"
    emptyIcon="task_alt"
    emptyMessage="No pending approvals">
    <ng-template appColumnCell="amount" let-row>
      @if (row.amount !== null) {
        {{ row.amount | currency }}
      } @else {
        <span class="text-muted">—</span>
      }
    </ng-template>
    <ng-template appColumnCell="requestedAt" let-row>
      {{ row.requestedAt | date:'MM/dd/yyyy' }}
    </ng-template>
    <ng-template appColumnCell="actions" let-row>
      <div class="approval-actions">
        <button class="action-btn action-btn--sm action-btn--primary"
          [disabled]="saving()"
          (click)="approve(row)"
          aria-label="Approve request">
          <span class="material-icons-outlined">check</span> Approve
        </button>
        <button class="icon-btn icon-btn--danger"
          [disabled]="saving()"
          (click)="openReject(row)"
          aria-label="Reject request">
          <span class="material-icons-outlined">close</span>
        </button>
      </div>
    </ng-template>
  </app-data-table>
</div>

@if (showRejectDialog()) {
  <app-dialog title="Reject Approval" width="440px" (closed)="showRejectDialog.set(false)">
    <p class="text-muted">
      Rejecting: <strong>{{ rejectTarget()?.entitySummary ?? rejectTarget()?.entityType }}</strong>
    </p>
    <app-textarea
      label="Reason for Rejection"
      [formControl]="rejectComments"
      [rows]="3"
      [maxlength]="1000"
      [required]="true" />
    <div dialog-footer>
      <button class="action-btn" (click)="showRejectDialog.set(false)">Cancel</button>
      <button class="action-btn action-btn--primary"
        [disabled]="rejectComments.invalid || saving()"
        (click)="submitReject()">Reject</button>
    </div>
  </app-dialog>
}
