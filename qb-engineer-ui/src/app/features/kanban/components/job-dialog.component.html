<app-dialog [title]="(mode() === 'create' ? ('kanban.newJob' | translate) : ('kanban.editJob' | translate))" width="520px" (closed)="cancel()">
  @if (loadingRefs()) {
    <div class="dialog-loading">
      <span class="material-icons-outlined">hourglass_empty</span>
      {{ 'common.loading' | translate }}
    </div>
  } @else {
    <div [formGroup]="jobForm">
      <app-input [label]="'kanban.jobTitle' | translate" formControlName="title" [maxlength]="200" [placeholder]="'kanban.jobTitlePlaceholder' | translate" />
      <app-textarea [label]="'kanban.jobDescription' | translate" formControlName="description" [rows]="3" />

      @if (mode() === 'create') {
        <app-select [label]="'kanban.trackType' | translate" formControlName="trackTypeId" [options]="trackTypeOptions()" />
      }

      <div class="dialog-row">
        <app-select [label]="'kanban.customer' | translate" formControlName="customerId" [options]="customerOptions()" />
        <app-select [label]="'kanban.assignee' | translate" formControlName="assigneeId" [options]="assigneeOptions()" />
      </div>

      <div class="dialog-row">
        <app-select [label]="'kanban.priority' | translate" formControlName="priority" [options]="priorityOptions" />
        <app-datepicker [label]="'kanban.dueDate' | translate" formControlName="dueDate" />
      </div>
    </div>
  }

  <div dialog-footer>
    <button class="action-btn" (click)="cancel()" [disabled]="saving()">{{ 'common.cancel' | translate }}</button>
    <button
      class="action-btn action-btn--primary"
      (click)="onSubmit()"
      [appValidationPopover]="violations"
      [disabled]="saving() || loadingRefs() || jobForm.invalid">
      @if (saving()) {
        <span class="material-icons-outlined btn-spinner">refresh</span>
      } @else {
        <span class="material-icons-outlined">save</span>
      }
      {{ mode() === 'create' ? ('kanban.createJob' | translate) : ('common.saveChanges' | translate) }}
    </button>
  </div>
</app-dialog>
