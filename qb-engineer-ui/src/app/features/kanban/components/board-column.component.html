<div class="column" [class.column--over-wip]="isOverWip()" [style.--col-tint]="column().stage.color">
  <div class="column__header" [style.border-top-color]="column().stage.color">
    <span class="column__name">{{ column().stage.name }}</span>
    <span class="column__count">{{ jobCount() }}</span>
    @if (wipLimit() !== null) {
      <span class="column__wip" [class.column__wip--warn]="isOverWip()">
        / {{ wipLimit() }}
      </span>
    }
    @if (column().stage.isIrreversible) {
      <span class="column__lock" [title]="'kanban.irreversibleTooltip' | translate">
        <span class="material-icons-outlined column__lock-icon">lock</span>
      </span>
    }
  </div>
  <div
    class="column__body"
    cdkDropList
    [id]="dropListId()"
    [cdkDropListData]="column().jobs"
    [cdkDropListConnectedTo]="allDropListIds()"
    [cdkDropListEnterPredicate]="canEnter"
    (cdkDropListDropped)="onDrop($event)">
    @for (job of column().jobs; track job.id) {
      <app-job-card [job]="job" [selected]="selectedJobIds().has(job.id)" cdkDrag [cdkDragData]="job" (cdkDragStarted)="onDragStarted($event)" (cardClicked)="onCardClicked($event)" (jobNumberClicked)="onJobNumberClicked($event)" />
    }
    @empty {
      <app-empty-state icon="work" [message]="'kanban.noJobs' | translate" />
    }
  </div>
</div>
