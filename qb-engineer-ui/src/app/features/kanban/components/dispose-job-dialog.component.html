<app-dialog [title]="'Dispose Job — ' + data.jobNumber" width="520px" (closed)="dialogRef.close()">
  <div [formGroup]="form">
    <app-select label="Disposition" formControlName="disposition" [options]="dispositionOptions" />
    <app-textarea label="Notes" formControlName="notes" [rows]="3" [maxlength]="2000" />
  </div>

  <div dialog-footer>
    <button class="action-btn" (click)="dialogRef.close()">Cancel</button>
    <button class="action-btn action-btn--primary"
      [appValidationPopover]="violations"
      [disabled]="form.invalid || saving()"
      (click)="save()">Dispose</button>
  </div>
</app-dialog>
