<app-dialog [title]="isEdit() ? ('aiAssistants.editAssistant' | translate) : ('aiAssistants.createAssistant' | translate)" width="720px" (closed)="close()">
  <div [formGroup]="form">
    <div class="dialog-row">
      <app-input [label]="'common.name' | translate" formControlName="name" [maxlength]="100" [required]="true" />
      <app-select [label]="'common.category' | translate" formControlName="category" [options]="categoryOptions" [required]="true" />
    </div>

    <app-textarea [label]="'common.description' | translate" formControlName="description" [rows]="2" [maxlength]="500" />

    <div class="dialog-row">
      <app-input [label]="'aiAssistants.assistantIcon' | translate" formControlName="icon" [maxlength]="50" [required]="true" />
      <div class="icon-preview">
        <span class="material-icons-outlined" [style.color]="form.controls.color.value">
          {{ form.controls.icon.value }}
        </span>
      </div>
      <input type="color" class="color-input" [formControl]="form.controls.color" [attr.aria-label]="'aiAssistants.assistantColor' | translate" />
    </div>

    <app-textarea [label]="'aiAssistants.assistantSystemPrompt' | translate" formControlName="systemPrompt" [rows]="10" [maxlength]="50000" [required]="true" />

    <app-select [label]="'aiAssistants.assistantEntityTypeFilters' | translate" formControlName="allowedEntityTypes" [options]="entityTypeOptions" [multiple]="true" [placeholder]="'aiAssistants.assistantEntityTypePlaceholder' | translate" />

    <!-- Starter Questions -->
    <div class="starter-questions">
      <span class="starter-questions__label">{{ 'aiAssistants.starterQuestions' | translate }}</span>
      <div class="starter-questions__list">
        @for (q of starterQuestions(); track $index) {
          <div class="starter-questions__item">
            <span class="starter-questions__text">{{ q }}</span>
            <button class="icon-btn icon-btn--danger" [attr.aria-label]="'aiAssistants.removeQuestion' | translate" [matTooltip]="'aiAssistants.removeQuestion' | translate" matTooltipPosition="above" (click)="removeQuestion($index)">
              <span class="material-icons-outlined">close</span>
            </button>
          </div>
        } @empty {
          <span class="text-muted">{{ 'aiAssistants.noStarterQuestions' | translate }}</span>
        }
      </div>
      <div class="starter-questions__add">
        <app-input [label]="'aiAssistants.newQuestion' | translate" [formControl]="newQuestion" [placeholder]="'aiAssistants.newQuestionPlaceholder' | translate" />
        <button class="action-btn action-btn--sm" [disabled]="!newQuestion.value?.trim()" (click)="addQuestion()">
          <span class="material-icons-outlined">add</span>
          {{ 'common.add' | translate }}
        </button>
      </div>
    </div>

    <div class="dialog-row">
      <app-toggle [label]="'common.active' | translate" formControlName="isActive" />
      <app-input [label]="'aiAssistants.assistantSortOrder' | translate" type="number" formControlName="sortOrder" />
    </div>

    <!-- Advanced Settings -->
    <button class="advanced-toggle" (click)="toggleAdvanced()" type="button">
      <span class="material-icons-outlined">{{ showAdvanced() ? 'expand_less' : 'expand_more' }}</span>
      {{ 'aiAssistants.advancedSettings' | translate }}
    </button>

    @if (showAdvanced()) {
      <div class="advanced-section">
        <div class="dialog-row">
          <app-input [label]="'aiAssistants.temperature' | translate" type="number" formControlName="temperature" />
          <app-input [label]="'aiAssistants.maxContextChunks' | translate" type="number" formControlName="maxContextChunks" />
        </div>
      </div>
    }
  </div>

  <div dialog-footer>
    <button class="action-btn" (click)="close()">{{ 'common.cancel' | translate }}</button>
    <button class="action-btn action-btn--primary"
      [appValidationPopover]="violations"
      [disabled]="form.invalid || saving()"
      (click)="save()">
      <span class="material-icons-outlined">save</span>
      {{ isEdit() ? ('common.saveChanges' | translate) : ('aiAssistantDialog.createAssistant' | translate) }}
    </button>
  </div>
</app-dialog>
