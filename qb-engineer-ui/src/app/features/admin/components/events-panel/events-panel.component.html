<div class="events-panel">
  <div class="panel-header">
    <span class="panel-header__count">{{ events().length }} events</span>
    <app-select
      label="Type"
      [formControl]="typeFilterControl"
      [options]="typeOptions" />
    <span class="events-panel__spacer"></span>
    <button class="action-btn action-btn--primary" (click)="openCreate()">
      <span class="material-icons-outlined">add</span>
      New Event
    </button>
  </div>

  <div [appLoadingBlock]="isLoading()">
    <app-data-table
      tableId="admin-events"
      [columns]="columns"
      [data]="events()"
      emptyIcon="event"
      emptyMessage="No events found">
      <ng-template appColumnCell="eventType" let-row>
        <span class="chip">
          <span class="material-icons-outlined chip__icon">{{ eventTypeIcon(row.eventType) }}</span>
          {{ row.eventType }}
        </span>
      </ng-template>
      <ng-template appColumnCell="startTime" let-row>
        {{ row.startTime | date:'MM/dd/yyyy hh:mm a' }}
      </ng-template>
      <ng-template appColumnCell="endTime" let-row>
        {{ row.endTime | date:'MM/dd/yyyy hh:mm a' }}
      </ng-template>
      <ng-template appColumnCell="isRequired" let-row>
        @if (row.isRequired) {
          <span class="chip chip--warning">Required</span>
        } @else {
          <span class="text-muted">Optional</span>
        }
      </ng-template>
      <ng-template appColumnCell="actions" let-row>
        <div class="row-actions">
          <button class="icon-btn" aria-label="Edit event" (click)="openEdit(row); $event.stopPropagation()">
            <span class="material-icons-outlined">edit</span>
          </button>
          <button class="icon-btn icon-btn--danger" aria-label="Cancel event" (click)="cancelEvent(row); $event.stopPropagation()">
            <span class="material-icons-outlined">close</span>
          </button>
        </div>
      </ng-template>
    </app-data-table>
  </div>
</div>

<!-- Event Dialog -->
@if (showDialog()) {
  <app-dialog [title]="editingEvent() ? 'Edit Event' : 'New Event'" width="600px" (closed)="closeDialog()">
    <div [formGroup]="form">
      <app-input label="Title" formControlName="title" [maxlength]="200" [required]="true" />

      <div class="dialog-row">
        <app-select label="Type" formControlName="eventType" [options]="formTypeOptions" [required]="true" />
        <app-input label="Location" formControlName="location" />
      </div>

      <div class="dialog-row">
        <app-datepicker label="Start Date" formControlName="startDate" [required]="true" />
        <app-input label="Start Time" formControlName="startTime" placeholder="HH:MM" [required]="true" />
      </div>

      <div class="dialog-row">
        <app-datepicker label="End Date" formControlName="endDate" [required]="true" />
        <app-input label="End Time" formControlName="endTime" placeholder="HH:MM" [required]="true" />
      </div>

      <app-textarea label="Description" formControlName="description" [rows]="3" />

      <app-select
        label="Attendees"
        formControlName="attendeeUserIds"
        [options]="userOptions()"
        [multiple]="true" />

      <app-toggle label="Required attendance" formControlName="isRequired" />
    </div>

    <div dialog-footer>
      <button class="action-btn" (click)="closeDialog()">Cancel</button>
      <button class="action-btn action-btn--primary"
        [appValidationPopover]="violations"
        [disabled]="form.invalid || saving()"
        (click)="save()">
        <span class="material-icons-outlined">save</span>
        {{ editingEvent() ? 'Save Changes' : 'Create Event' }}
      </button>
    </div>
  </app-dialog>
}
