<div class="audit-log-panel">
  <div class="audit-log-panel__filters">
    <app-select
      [label]="'adminPanels.auditLog.entityType' | translate"
      [formControl]="entityTypeControl"
      [options]="entityTypeOptions" />
    <app-input
      [label]="'adminPanels.auditLog.action' | translate"
      [formControl]="actionControl"
      [placeholder]="'adminPanels.auditLog.actionPlaceholder' | translate" />
    <app-datepicker
      [label]="'adminPanels.auditLog.fromDate' | translate"
      [formControl]="fromDateControl" />
    <app-datepicker
      [label]="'adminPanels.auditLog.toDate' | translate"
      [formControl]="toDateControl" />
  </div>

  <div [appLoadingBlock]="isLoading()">
    <app-data-table
      tableId="admin-audit-log"
      [columns]="columns"
      [data]="entries()"
      emptyIcon="manage_search"
      [emptyMessage]="'adminPanels.auditLog.noEntries' | translate" />
  </div>

  <mat-paginator
    [length]="totalCount()"
    [pageSize]="pageSize()"
    [pageIndex]="page() - 1"
    [pageSizeOptions]="[25, 50, 100]"
    (page)="onPageChange($event)"
    aria-label="Audit log pagination" />
</div>
