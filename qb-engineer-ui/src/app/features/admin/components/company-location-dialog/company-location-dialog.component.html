<app-dialog [title]="isEdit() ? 'Edit Location' : 'New Location'" width="520px" (closed)="closed.emit()">
  <div [formGroup]="form">
    <app-input label="Location Name" formControlName="name" [required]="true" [maxlength]="100" />
    <app-input label="Phone" formControlName="phone" mask="phone" />

    <app-address-form
      formControlName="address"
      [showVerify]="false"
      [fixedCountry]="'US'"
      [compact]="true" />

    @if (isEdit()) {
      <app-toggle label="Active" formControlName="isActive" />
    }
  </div>

  <div dialog-footer>
    <button class="action-btn" (click)="closed.emit()">Cancel</button>
    <button class="action-btn action-btn--primary"
      [appValidationPopover]="violations"
      [disabled]="form.invalid || saving()"
      (click)="save()">
      <span class="material-icons-outlined">save</span>
      {{ isEdit() ? 'Save Changes' : 'Create Location' }}
    </button>
  </div>
</app-dialog>
