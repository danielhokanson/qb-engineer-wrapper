<div class="auth-page">
  <mat-card appearance="outlined" class="auth-card" [class.auth-card--wide]="step() === 2">
    <div class="auth-card__header">
      <span class="material-icons-outlined auth-card__icon">precision_manufacturing</span>
      <h1 class="auth-card__title">{{ 'auth.appName' | translate }}</h1>
      <p class="auth-card__subtitle">
        @if (step() === 1) {
          {{ 'auth.step1Title' | translate }}
        } @else {
          {{ 'auth.step2Title' | translate }}
        }
      </p>
    </div>

    @if (step() === 1) {
      <form class="auth-card__form" [formGroup]="accountForm" (ngSubmit)="nextStep()">
        <div class="auth-card__row">
          <app-input [label]="'auth.firstName' | translate" formControlName="firstName" autocomplete="given-name" [required]="true" />
          <app-input [label]="'auth.lastName' | translate" formControlName="lastName" autocomplete="family-name" [required]="true" />
        </div>

        <app-input [label]="'auth.email' | translate" type="email" formControlName="email" autocomplete="email" [required]="true" />
        <app-input [label]="'auth.password' | translate" type="password" formControlName="password"
          autocomplete="new-password" [required]="true"
          [info]="'auth.passwordHint' | translate" />

        <button mat-flat-button color="primary" type="submit"
          [appValidationPopover]="accountViolations"
          [disabled]="accountForm.invalid">
          {{ 'common.next' | translate }}
        </button>
      </form>
    } @else {
      <form class="auth-card__form" [formGroup]="companyForm" (ngSubmit)="onSubmit()">
        <app-input [label]="'auth.companyName' | translate" formControlName="companyName" [required]="true" />

        <div class="auth-card__row">
          <app-input [label]="'common.phone' | translate" formControlName="companyPhone" mask="phone" />
          <app-input [label]="'common.email' | translate" formControlName="companyEmail" type="email" />
        </div>

        <div class="auth-card__row">
          <app-input [label]="'auth.ein' | translate" formControlName="companyEin" [placeholder]="'auth.einPlaceholder' | translate" />
          <app-input [label]="'auth.website' | translate" formControlName="companyWebsite" [placeholder]="'auth.websitePlaceholder' | translate" />
        </div>

        <h4 class="auth-card__section-title">{{ 'auth.primaryLocation' | translate }}</h4>

        <app-input [label]="'auth.locationName' | translate" formControlName="locationName" />

        <app-address-form
          formControlName="address"
          [showVerify]="false"
          [fixedCountry]="'US'"
          [compact]="true" />

        <div class="auth-card__buttons">
          <button mat-stroked-button type="button" (click)="prevStep()">{{ 'common.back' | translate }}</button>
          <button mat-flat-button color="primary" type="submit"
            [appValidationPopover]="companyViolations"
            [disabled]="companyForm.invalid || loading()">
            @if (loading()) {
              {{ 'auth.settingUp' | translate }}
            } @else {
              {{ 'auth.completeSetup' | translate }}
            }
          </button>
        </div>
      </form>
    }
  </mat-card>
</div>
