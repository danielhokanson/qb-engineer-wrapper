<div class="auth-page">
  <mat-card appearance="outlined" class="auth-card">
    <div class="auth-card__header">
      <span class="material-icons-outlined auth-card__icon">precision_manufacturing</span>
      <h1 class="auth-card__title">QB Engineer</h1>
      <p class="auth-card__subtitle">Create Admin Account</p>
    </div>

    <form class="auth-card__form" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="auth-card__row">
        <app-input label="First Name" formControlName="firstName" autocomplete="given-name" />
        <app-input label="Last Name" formControlName="lastName" autocomplete="family-name" />
      </div>

      <app-input label="Email" type="email" formControlName="email" autocomplete="email" />
      <app-input label="Password" type="password" formControlName="password"
        autocomplete="new-password" info="At least 8 characters with uppercase, lowercase, and a digit" />

      <button mat-flat-button color="primary" type="submit"
        [appValidationPopover]="violations"
        [disabled]="form.invalid || loading()">
        @if (loading()) {
          Creating account...
        } @else {
          Create Account
        }
      </button>
    </form>
  </mat-card>
</div>
