<div class="setup-container">
  <mat-card class="setup-card">
    <mat-card-header>
      <mat-card-title>Complete Your Account</mat-card-title>
      <mat-card-subtitle>Set your password to get started</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      @if (error(); as err) {
        <div class="setup-error">
          <span class="material-icons-outlined">error_outline</span>
          <p>{{ err }}</p>
        </div>
      }

      <div [formGroup]="form" class="setup-form">
        <app-input label="First Name (optional)" formControlName="firstName" />
        <app-input label="Last Name (optional)" formControlName="lastName" />
        <app-input label="Password" type="password" formControlName="password" />
        <app-input label="Confirm Password" type="password" formControlName="confirmPassword" />
      </div>
    </mat-card-content>

    <mat-card-actions>
      <button mat-flat-button color="primary"
        [appValidationPopover]="violations"
        [disabled]="form.invalid || loading()"
        (click)="onSubmit()">
        Complete Setup
      </button>
    </mat-card-actions>
  </mat-card>
</div>
