<div class="setup-container">
  <mat-card class="setup-card">
    <mat-card-header>
      @if (tokenInfo(); as info) {
        <mat-card-title>Welcome, {{ info.firstName }} {{ info.lastName }}</mat-card-title>
        <mat-card-subtitle>{{ 'auth.createAccount' | translate }}</mat-card-subtitle>
      } @else {
        <mat-card-title>{{ 'auth.createAccount' | translate }}</mat-card-title>
        <mat-card-subtitle>{{ 'auth.createAccount' | translate }}</mat-card-subtitle>
      }
    </mat-card-header>

    <mat-card-content>
      @if (error(); as err) {
        <div class="setup-error">
          <span class="material-icons-outlined">error_outline</span>
          <p>{{ err }}</p>
        </div>
      }

      @if (!error()) {
        <div [formGroup]="form" class="setup-form">
          <app-input [label]="'auth.password' | translate" type="password" formControlName="password" autocomplete="new-password" />
          <app-input [label]="'auth.confirmPassword' | translate" type="password" formControlName="confirmPassword" autocomplete="new-password" />
        </div>
      }
    </mat-card-content>

    @if (!error()) {
      <mat-card-actions>
        <button mat-flat-button color="primary"
          [appValidationPopover]="violations"
          [disabled]="form.invalid || loading()"
          (click)="onSubmit()">
          {{ 'auth.completeSetup' | translate }}
        </button>
      </mat-card-actions>
    }
  </mat-card>
</div>
