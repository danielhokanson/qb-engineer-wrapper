<div class="auth-page">
  <mat-card appearance="outlined" class="auth-card form-stack">
    <div class="auth-card__header">
      <span class="material-icons-outlined auth-card__icon">precision_manufacturing</span>
      <h1 class="auth-card__title">QB Engineer</h1>
      <p class="auth-card__subtitle">Manufacturing Operations Platform</p>
    </div>

    <form class="auth-card__form form-stack" [formGroup]="form" (ngSubmit)="onSubmit()">
      <app-input label="Email" type="email" formControlName="email" autocomplete="email" />
      <app-input label="Password" type="password" formControlName="password" autocomplete="current-password" />

      <button mat-flat-button color="primary" type="submit"
        [appValidationPopover]="violations"
        [disabled]="form.invalid || loading()">
        @if (loading()) {
          Signing in...
        } @else {
          Sign In
        }
      </button>
    </form>
  </mat-card>
</div>
