<div class="auth-page">
  <mat-card appearance="outlined" class="auth-card form-stack">
    <div class="auth-card__header">
      <span class="material-icons-outlined auth-card__icon">precision_manufacturing</span>
      <h1 class="auth-card__title">QB Engineer</h1>
      <p class="auth-card__subtitle">Manufacturing Operations Platform</p>
    </div>

    <form class="auth-card__form form-stack" [formGroup]="form" (ngSubmit)="onSubmit()">
      <app-input label="Email" type="email" formControlName="email" autocomplete="email" />
      <app-input label="Password" type="password" formControlName="password" autocomplete="current-password" />

      <button mat-flat-button color="primary" type="submit"
        [appValidationPopover]="violations"
        [disabled]="form.invalid || loading()">
        @if (loading()) {
          Signing in...
        } @else {
          Sign In
        }
      </button>
    </form>

    <div class="auth-card__setup">
      @if (showSetupCode()) {
        <div class="setup-code-entry">
          <app-input label="Setup Code" [formControl]="setupCodeControl" placeholder="XXXX-XXXX" autocomplete="off" />
          <div class="setup-code-entry__actions">
            <button mat-stroked-button (click)="showSetupCode.set(false)">Cancel</button>
            <button mat-flat-button color="primary"
              [disabled]="!setupCodeControl.value?.trim()"
              (click)="goToSetup()">
              Continue
            </button>
          </div>
        </div>
      } @else {
        <button mat-button class="auth-card__setup-link" (click)="showSetupCode.set(true)">
          <span class="material-icons-outlined">vpn_key</span>
          Have a setup code?
        </button>
      }
    </div>

    @if (ssoProviders().length > 0) {
      <div class="auth-card__sso">
        <div class="auth-card__divider">
          <mat-divider />
          <span class="auth-card__divider-text">or sign in with</span>
          <mat-divider />
        </div>

        <div class="auth-card__sso-buttons">
          @for (provider of ssoProviders(); track provider.id) {
            <button mat-stroked-button class="auth-card__sso-btn" (click)="ssoLogin(provider)"
              [disabled]="loading()">
              <span class="material-icons-outlined">{{ getSsoIcon(provider.id) }}</span>
              {{ provider.name }}
            </button>
          }
        </div>
      </div>
    }
  </mat-card>
</div>
