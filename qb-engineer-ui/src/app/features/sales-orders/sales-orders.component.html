<app-page-header [title]="'salesOrders.title' | translate" [subtitle]="'salesOrders.subtitle' | translate">
  <button class="action-btn action-btn--primary" (click)="openCreateDialog()">
    <span class="material-icons-outlined">add</span>
    {{ 'salesOrders.newOrder' | translate }}
  </button>
</app-page-header>

<div class="so-layout">
  <!-- Left: SO List -->
  <div class="so-list-panel">
    <div class="filters-bar">
      <app-input [label]="'common.search' | translate" [formControl]="searchControl" [placeholder]="'salesOrders.searchPlaceholder' | translate"
        (keyup.enter)="applyFilters()" />
      <app-select [label]="'salesOrders.customer' | translate" [formControl]="customerFilterControl" [options]="customerOptions()" />
      <app-select [label]="'common.status' | translate" [formControl]="statusFilterControl" [options]="statusOptions" />
    </div>

    <div [appLoadingBlock]="loading()">
      <app-data-table tableId="sales-orders" [columns]="soColumns" [data]="salesOrders()"
        [rowClass]="soRowClass" emptyIcon="receipt_long" [emptyMessage]="'salesOrders.noOrdersFound' | translate"
        [clickableRows]="true"
        (rowClick)="openSalesOrderDetail($any($event))">
        <ng-template appColumnCell="orderNumber" let-row>
          <span class="so-number">{{ row.orderNumber }}</span>
        </ng-template>
        <ng-template appColumnCell="customerName" let-row>
          <span>{{ row.customerName }}</span>
        </ng-template>
        <ng-template appColumnCell="customerPO" let-row>
          <span class="text-muted">{{ row.customerPO ?? '—' }}</span>
        </ng-template>
        <ng-template appColumnCell="status" let-row>
          <span [class]="getStatusClass(row.status)">{{ getStatusLabel(row.status) }}</span>
        </ng-template>
        <ng-template appColumnCell="total" let-row>
          <span>{{ row.total | currency }}</span>
        </ng-template>
        <ng-template appColumnCell="requestedDeliveryDate" let-row>
          <span class="text-muted">{{ row.requestedDeliveryDate ? (row.requestedDeliveryDate | date:'MM/dd/yyyy') : '—' }}</span>
        </ng-template>
        <ng-template appColumnCell="createdAt" let-row>
          <span class="text-muted">{{ row.createdAt | date:'MM/dd/yyyy' }}</span>
        </ng-template>
      </app-data-table>
    </div>
  </div>

</div>

@if (showCreateDialog()) {
  <app-so-dialog (closed)="closeCreateDialog()" (saved)="onCreateSaved()" />
}
