<a class="skip-link" href="#main-content">Skip to main content</a>
@if (showShell()) {
  <app-header />
  <app-connection-banner />
  <div class="app-body" [attr.inert]="isGlobalLoading() || null">
    @if (layout.sidebarVisible()) {
      @if (layout.isMobile()) {
        <div class="mobile-sidebar-backdrop" (click)="layout.closeMobileMenu()"></div>
      }
      <app-sidebar />
    }
    <main class="app-main" id="main-content">
      <router-outlet />
    </main>
  </div>
} @else {
  <main id="main-content">
    <router-outlet />
  </main>
}

<app-loading-overlay />
<app-toast-container />
<app-keyboard-shortcuts-help />
