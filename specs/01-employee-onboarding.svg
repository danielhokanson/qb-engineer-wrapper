<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 640" font-family="Segoe UI, Arial, sans-serif">
  <title>Employee Onboarding Process</title>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="640" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#0f172a">Employee Onboarding Process</text>
  <text x="550" y="62" text-anchor="middle" font-size="13" fill="#64748b">Admin-initiated account creation with on-site or email claim</text>

  <!-- === ROW 1: Admin Creates User Record === -->
  <text x="40" y="110" font-size="12" font-weight="600" fill="#64748b">ADMIN</text>

  <!-- Step 1: Admin Creates Record -->
  <rect x="40" y="125" width="170" height="80" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="125" y="152" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">Create User Record</text>
  <text x="125" y="170" text-anchor="middle" font-size="10" fill="#3b82f6">Name, role(s), dept,</text>
  <text x="125" y="183" text-anchor="middle" font-size="10" fill="#3b82f6">manager, email (opt)</text>

  <line x1="210" y1="165" x2="240" y2="165" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Assign Roles -->
  <rect x="240" y="125" width="160" height="80" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="320" y="152" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">Assign Role(s)</text>
  <text x="320" y="170" text-anchor="middle" font-size="10" fill="#3b82f6">Engineer, Worker,</text>
  <text x="320" y="183" text-anchor="middle" font-size="10" fill="#3b82f6">PM, Manager, etc.</text>

  <line x1="400" y1="165" x2="430" y2="165" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2.5: Assign Badge/NFC (optional) -->
  <rect x="430" y="125" width="170" height="80" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="515" y="150" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">Assign Badge ID</text>
  <text x="515" y="168" text-anchor="middle" font-size="10" fill="#3b82f6">Barcode, NFC, or card</text>
  <text x="515" y="181" text-anchor="middle" font-size="10" fill="#3b82f6">for shop floor scan</text>
  <text x="515" y="198" text-anchor="middle" font-size="9" font-style="italic" fill="#94a3b8">(optional)</text>

  <line x1="600" y1="165" x2="630" y2="165" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Choose Claim Method -->
  <polygon points="720,125 810,165 720,205 630,165" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="720" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">Claim</text>
  <text x="720" y="176" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">Method?</text>

  <!-- === ROW 2: Two Claim Paths === -->

  <!-- Path A: Setup Code (top branch) -->
  <line x1="720" y1="125" x2="720" y2="90" stroke="#334155" stroke-width="1.5"/>
  <line x1="720" y1="90" x2="870" y2="90" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="795" y="82" text-anchor="middle" font-size="10" fill="#64748b">On-site (default)</text>

  <rect x="870" y="55" width="200" height="70" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="970" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#065f46">Generate Setup Code</text>
  <text x="970" y="98" text-anchor="middle" font-size="10" fill="#059669">6-digit alphanumeric</text>
  <text x="970" y="111" text-anchor="middle" font-size="10" fill="#059669">shown to admin on screen</text>

  <!-- Path B: Email Invite (bottom branch) -->
  <line x1="720" y1="205" x2="720" y2="240" stroke="#334155" stroke-width="1.5"/>
  <line x1="720" y1="240" x2="870" y2="240" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="795" y="232" text-anchor="middle" font-size="10" fill="#64748b">Email (requires SMTP)</text>

  <rect x="870" y="205" width="200" height="70" rx="4" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="970" y="230" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6">Send Email Invite</text>
  <text x="970" y="248" text-anchor="middle" font-size="10" fill="#7c3aed">One-time invite link</text>
  <text x="970" y="261" text-anchor="middle" font-size="10" fill="#7c3aed">Expires in 7 days (config)</text>

  <!-- === ROW 3: Employee Claim Flow === -->
  <text x="40" y="330" font-size="12" font-weight="600" fill="#64748b">EMPLOYEE</text>

  <!-- Step: Navigate to Setup Page -->
  <rect x="40" y="345" width="180" height="70" rx="4" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="130" y="372" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Open Setup Page</text>
  <text x="130" y="390" text-anchor="middle" font-size="10" fill="#64748b">Via setup code or invite link</text>

  <line x1="220" y1="380" x2="280" y2="380" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step: Find Their Record -->
  <rect x="280" y="345" width="180" height="70" rx="4" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="370" y="372" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Identify Record</text>
  <text x="370" y="390" text-anchor="middle" font-size="10" fill="#64748b">Enter name or setup code</text>

  <line x1="460" y1="380" x2="520" y2="380" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step: Set Password -->
  <rect x="520" y="345" width="180" height="70" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="610" y="372" text-anchor="middle" font-size="13" font-weight="600" fill="#065f46">Set Password</text>
  <text x="610" y="390" text-anchor="middle" font-size="10" fill="#059669">Create secure password</text>

  <line x1="700" y1="380" x2="760" y2="380" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step: Account Active -->
  <rect x="760" y="345" width="200" height="70" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="860" y="370" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">ACCOUNT ACTIVE</text>
  <text x="860" y="388" text-anchor="middle" font-size="10" fill="#059669">Employee can log in</text>
  <text x="860" y="401" text-anchor="middle" font-size="10" fill="#059669">Role-based UI applied</text>

  <!-- === ROW 4: System Actions === -->
  <text x="40" y="465" font-size="12" font-weight="600" fill="#64748b">SYSTEM</text>

  <rect x="40" y="480" width="220" height="60" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="150" y="505" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">Sync to Accounting</text>
  <text x="150" y="520" text-anchor="middle" font-size="10" fill="#b45309">Employee record → QB (if connected)</text>

  <line x1="260" y1="510" x2="320" y2="510" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="320" y="480" width="220" height="60" rx="4" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="430" y="505" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Admin Notified</text>
  <text x="430" y="520" text-anchor="middle" font-size="10" fill="#64748b">Account claimed confirmation</text>

  <!-- Legend -->
  <rect x="40" y="575" width="1020" height="45" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="55" y="590" width="14" height="14" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="75" y="602" font-size="10" fill="#334155">Admin Action</text>
  <rect x="165" y="590" width="14" height="14" rx="2" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="185" y="602" font-size="10" fill="#334155">Employee Action</text>
  <rect x="290" y="590" width="14" height="14" rx="2" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="310" y="602" font-size="10" fill="#334155">Completion</text>
  <rect x="390" y="590" width="14" height="14" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="410" y="602" font-size="10" fill="#334155">System / Sync</text>
  <rect x="500" y="590" width="14" height="14" rx="2" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="520" y="602" font-size="10" fill="#334155">Email (Optional)</text>
  <rect x="630" y="590" width="14" height="14" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="650" y="602" font-size="10" fill="#334155">Optional Step</text>
  <polygon points="780,590 794,597 780,604 766,597" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="805" y="602" font-size="10" fill="#334155">Decision</text>
</svg>