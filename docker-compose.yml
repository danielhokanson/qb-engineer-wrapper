services:
  qb-engineer-ui:
    build:
      context: ./qb-engineer-ui
      args:
        BUILD_VERSION: ${BUILD_VERSION:-0}
        BUILD_SHA: ${BUILD_SHA:-dev}
    container_name: qb-engineer-ui
    ports:
      - "${UI_PORT:-4200}:80"
    depends_on:
      qb-engineer-api:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  qb-engineer-api:
    build:
      context: ./qb-engineer-server
      dockerfile: qb-engineer.api/Dockerfile
    container_name: qb-engineer-api
    ports:
      - "${API_PORT:-5000}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - RECREATE_DB=${RECREATE_DB:-false}
      - ConnectionStrings__DefaultConnection=Host=qb-engineer-db;Port=5432;Database=${POSTGRES_DB:-qb_engineer};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      - Jwt__Key=${JWT_KEY:-dev-secret-key-change-in-production-min-32-chars!!}
      - Jwt__Issuer=${JWT_ISSUER:-qb-engineer}
      - Jwt__Audience=${JWT_AUDIENCE:-qb-engineer-ui}
      - Minio__Endpoint=qb-engineer-storage:9000
      - Minio__PublicEndpoint=${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      - Minio__AccessKey=${MINIO_ROOT_USER:-minioadmin}
      - Minio__SecretKey=${MINIO_ROOT_PASSWORD:-minioadmin}
      - Minio__UseSsl=false
      - MockIntegrations=${MOCK_INTEGRATIONS:-false}
      - Storage__Provider=${STORAGE_PROVIDER:-minio}
      - LocalStorage__RootPath=/app/storage
      - LocalStorage__PublicBaseUrl=${LOCAL_STORAGE_PUBLIC_URL:-http://localhost:5000}
      - LocalStorage__PresignedUrlExpirySeconds=${LOCAL_STORAGE_URL_EXPIRY:-3600}
      - Usps__ConsumerKey=${USPS_CONSUMER_KEY:-}
      - Usps__ConsumerSecret=${USPS_CONSUMER_SECRET:-}
      - Ai__BaseUrl=${AI_BASE_URL:-http://qb-engineer-ai:11434}
      - Ai__Model=${AI_MODEL:-gemma3:4b}
      - Ai__EmbeddingModel=${AI_EMBEDDING_MODEL:-all-minilm:l6-v2}
      - Ai__DocsPath=/app/docs
      - FrontendBaseUrl=${FRONTEND_BASE_URL:-http://localhost:4200}
      - FormRendererBaseUrl=${FORM_RENDERER_BASE_URL:-http://qb-engineer-ui:80}
      - DocuSeal__BaseUrl=${DOCUSEAL_BASE_URL:-http://qb-engineer-signing:3000}
      - DocuSeal__PublicBaseUrl=${DOCUSEAL_PUBLIC_BASE_URL:-${FRONTEND_BASE_URL:-http://localhost:4200}/docuseal}
      - DocuSeal__ApiKey=${DOCUSEAL_API_KEY:-}
      - DocuSeal__TimeoutSeconds=${DOCUSEAL_TIMEOUT:-30}
      - DocuSeal__WebhookSecret=${DOCUSEAL_WEBHOOK_SECRET:-}
      - Tts__ApiKey=${TTS_API_KEY:-}
      - Coqui__BaseUrl=${COQUI_BASE_URL:-}
      - Coqui__SpeakerId=${COQUI_SPEAKER_ID:-}
      - Stamps__ApiKey=${STAMPS_API_KEY:-}
      - Stamps__AccountId=${STAMPS_ACCOUNT_ID:-}
      - Stamps__Environment=${STAMPS_ENVIRONMENT:-sandbox}
      - APP_VERSION=${APP_VERSION:-dev}
      - GIT_COMMIT=${GIT_COMMIT:-}
    volumes:
      - ./docs:/app/docs:ro
      - ${LOCAL_STORAGE_PATH:-./storage}:/app/storage
      - ./tools:/app/tools:ro
    depends_on:
      qb-engineer-db:
        condition: service_healthy
      qb-engineer-storage:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

  qb-engineer-db:
    image: pgvector/pgvector:pg17
    container_name: qb-engineer-db
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-qb_engineer}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-qb_engineer}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  qb-engineer-storage:
    image: minio/minio
    container_name: qb-engineer-storage
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  qb-engineer-backup:
    image: alpine:3.19
    container_name: qb-engineer-backup
    command: ["sh", "-c", "echo 'Backup container placeholder' && sleep infinity"]
    restart: unless-stopped

  qb-engineer-ai:
    image: ollama/ollama
    container_name: qb-engineer-ai
    ports:
      - "${AI_PORT:-11434}:11434"
    volumes:
      - ollamadata:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      start_period: 30s
      retries: 5
    profiles:
      - ai
    deploy:
      resources:
        limits:
          memory: 6G
    restart: unless-stopped

  qb-engineer-ai-init:
    image: ollama/ollama
    container_name: qb-engineer-ai-init
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "ollama pull gemma3:4b && ollama pull all-minilm:l6-v2 && echo 'AI model init complete'"
    environment:
      - OLLAMA_HOST=http://qb-engineer-ai:11434
    depends_on:
      qb-engineer-ai:
        condition: service_healthy
    profiles:
      - ai
    restart: "no"

  qb-engineer-tts:
    image: ghcr.io/coqui-ai/tts-cpu:latest
    container_name: qb-engineer-tts
    ports:
      - "${TTS_PORT:-5002}:5002"
    volumes:
      - ttsdata:/root/.local/share/tts
    # tts-server serves HTTP on --port; tts (the CLI default entrypoint) exits immediately
    entrypoint: tts-server
    command: --model_name tts_models/en/vctk/vits --port 5002 --use_cuda false
    profiles:
      - tts
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

  qb-engineer-signing:
    image: docuseal/docuseal:latest
    container_name: qb-engineer-signing
    ports:
      - "${DOCUSEAL_PORT:-3000}:3000"
    volumes:
      - docusealdata:/data
    environment:
      - SECRET_KEY_BASE=${DOCUSEAL_SECRET_KEY:-change-me-in-production}
    profiles:
      - signing
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
  ollamadata:
  docusealdata:
  ttsdata:
