<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" font-family="Segoe UI, Arial, sans-serif">
  <title>Customer Return Flow</title>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="450" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#0f172a">Customer Return Flow</text>
  <text x="500" y="55" text-anchor="middle" font-size="13" fill="#64748b">One button on completed job cards → 3 questions → automatic system response</text>

  <!-- Trigger -->
  <rect x="350" y="75" width="300" height="55" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="500" y="98" text-anchor="middle" font-size="14" font-weight="bold" fill="#991b1b">"Customer Return" button</text>
  <text x="500" y="115" text-anchor="middle" font-size="10" fill="#dc2626">On any completed job card</text>

  <line x1="500" y1="130" x2="500" y2="155" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 3 Questions -->
  <rect x="180" y="155" width="640" height="55" rx="4" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="500" y="178" text-anchor="middle" font-size="13" font-weight="600" fill="#3730a3">3 Questions</text>

  <text x="280" y="198" text-anchor="middle" font-size="10" fill="#475569">1. What happened? (dropdown)</text>
  <text x="500" y="198" text-anchor="middle" font-size="10" fill="#475569">2. How many? (quantity)</text>
  <text x="720" y="198" text-anchor="middle" font-size="10" fill="#475569">3. Photo? (optional)</text>

  <!-- Reason branches -->
  <line x1="500" y1="210" x2="500" y2="240" stroke="#334155" stroke-width="1.5"/>

  <!-- Branch lines -->
  <line x1="500" y1="240" x2="150" y2="240" stroke="#334155" stroke-width="1"/>
  <line x1="500" y1="240" x2="500" y2="240" stroke="#334155" stroke-width="1"/>
  <line x1="500" y1="240" x2="850" y2="240" stroke="#334155" stroke-width="1"/>

  <line x1="150" y1="240" x2="150" y2="265" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="240" x2="500" y2="265" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="850" y1="240" x2="850" y2="265" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Defective / Wrong Part -->
  <rect x="30" y="265" width="240" height="100" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="150" y="290" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">Defective / Wrong Part</text>
  <line x1="50" y1="298" x2="250" y2="298" stroke="#fde68a" stroke-width="1"/>
  <text x="150" y="318" text-anchor="middle" font-size="10" fill="#475569">Auto-creates linked</text>
  <text x="150" y="333" text-anchor="middle" font-size="10" fill="#475569">rework card in backlog</text>
  <text x="150" y="348" text-anchor="middle" font-size="10" font-weight="600" fill="#d97706">→ Rework Job Card</text>

  <!-- Damaged in Shipping -->
  <rect x="380" y="265" width="240" height="100" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="500" y="290" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">Damaged in Shipping</text>
  <line x1="400" y1="298" x2="600" y2="298" stroke="#fde68a" stroke-width="1"/>
  <text x="500" y="318" text-anchor="middle" font-size="10" fill="#475569">Flags for office manager</text>
  <text x="500" y="333" text-anchor="middle" font-size="10" fill="#475569">/ admin to handle</text>
  <text x="500" y="348" text-anchor="middle" font-size="10" font-weight="600" fill="#d97706">→ Office Queue</text>

  <!-- Customer Changed Mind -->
  <rect x="730" y="265" width="240" height="100" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="850" y="290" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">Customer Changed Mind</text>
  <line x1="750" y1="298" x2="950" y2="298" stroke="#e2e8f0" stroke-width="1"/>
  <text x="850" y="318" text-anchor="middle" font-size="10" fill="#475569">Flags for office manager</text>
  <text x="850" y="333" text-anchor="middle" font-size="10" fill="#475569">/ admin to handle</text>
  <text x="850" y="348" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">→ Office Queue</text>

  <!-- All cases: Credit memo -->
  <rect x="250" y="395" width="500" height="40" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="500" y="420" text-anchor="middle" font-size="11" fill="#065f46">All cases → Credit memo handled by financial person in accounting system (or guided prompt in direct mode)</text>

  <line x1="150" y1="365" x2="150" y2="415" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="150" y1="415" x2="250" y2="415" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <line x1="500" y1="365" x2="500" y2="395" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <line x1="850" y1="365" x2="850" y2="415" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="850" y1="415" x2="750" y2="415" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
</svg>