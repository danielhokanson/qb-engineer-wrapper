<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="Segoe UI, Arial, sans-serif">
  <title>Production Run — Label Printing &amp; Bin Assignment</title>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="750" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#0f172a">Production Run — Label Printing &amp; Bin Assignment</text>
  <text x="550" y="57" text-anchor="middle" font-size="13" fill="#64748b">From production run creation through labeling, binning, and shipping</text>

  <!-- Step 1: Create Production Run -->
  <rect x="50" y="85" width="280" height="120" rx="4" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="190" y="107" text-anchor="middle" font-size="11" font-weight="bold" fill="#3730a3">STEP 1</text>
  <text x="190" y="127" text-anchor="middle" font-size="14" font-weight="600" fill="#3730a3">Create Production Run</text>
  <line x1="80" y1="135" x2="300" y2="135" stroke="#c7d2fe" stroke-width="1"/>
  <text x="190" y="155" text-anchor="middle" font-size="10" fill="#475569">Lot number assigned</text>
  <text x="190" y="170" text-anchor="middle" font-size="10" fill="#475569">Machine &amp; operator selected</text>
  <text x="190" y="185" text-anchor="middle" font-size="10" fill="#475569">Quantity to produce entered</text>
  <text x="190" y="200" text-anchor="middle" font-size="10" fill="#475569">Process parameters recorded</text>

  <line x1="330" y1="145" x2="390" y2="145" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Label Prompt -->
  <rect x="390" y="85" width="280" height="120" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="530" y="107" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">STEP 2</text>
  <text x="530" y="127" text-anchor="middle" font-size="14" font-weight="600" fill="#92400e">Print Label(s)?</text>
  <line x1="420" y1="135" x2="640" y2="135" stroke="#fde68a" stroke-width="1"/>
  <text x="530" y="155" text-anchor="middle" font-size="10" fill="#475569">System prompts after run creation</text>
  <text x="530" y="170" text-anchor="middle" font-size="10" fill="#475569">User specifies label count</text>
  <text x="530" y="185" text-anchor="middle" font-size="10" fill="#475569">(default: 1, increase for multi-bin)</text>
  <text x="530" y="200" text-anchor="middle" font-size="10" font-weight="600" fill="#d97706">Quantity auto-divided across labels</text>

  <line x1="670" y1="145" x2="730" y2="145" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Print -->
  <rect x="730" y="85" width="320" height="120" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="890" y="107" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">STEP 3</text>
  <text x="890" y="127" text-anchor="middle" font-size="14" font-weight="600" fill="#065f46">Print Labels</text>
  <line x1="760" y1="135" x2="1020" y2="135" stroke="#bbf7d0" stroke-width="1"/>
  <text x="890" y="155" text-anchor="middle" font-size="10" fill="#475569">Browser print dialog</text>
  <text x="890" y="170" text-anchor="middle" font-size="10" fill="#475569">bwip-js barcode generation</text>
  <text x="890" y="185" text-anchor="middle" font-size="10" fill="#475569">CSS print stylesheet for layout</text>
  <text x="890" y="200" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">Admin configures label size/format</text>

  <!-- === LABEL CONTENT DETAIL === -->
  <rect x="50" y="240" width="1000" height="200" rx="6" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="550" y="268" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Label Contents — Barcode + Human-Readable</text>

  <!-- Sample Label -->
  <rect x="100" y="285" width="380" height="140" rx="2" fill="#fff" stroke="#000" stroke-width="2"/>
  <!-- Barcode representation -->
  <rect x="120" y="300" width="3" height="50" fill="#000"/>
  <rect x="126" y="300" width="1" height="50" fill="#000"/>
  <rect x="130" y="300" width="4" height="50" fill="#000"/>
  <rect x="137" y="300" width="2" height="50" fill="#000"/>
  <rect x="142" y="300" width="3" height="50" fill="#000"/>
  <rect x="148" y="300" width="1" height="50" fill="#000"/>
  <rect x="152" y="300" width="5" height="50" fill="#000"/>
  <rect x="160" y="300" width="2" height="50" fill="#000"/>
  <rect x="165" y="300" width="3" height="50" fill="#000"/>
  <rect x="171" y="300" width="1" height="50" fill="#000"/>
  <rect x="175" y="300" width="4" height="50" fill="#000"/>
  <rect x="182" y="300" width="2" height="50" fill="#000"/>
  <rect x="187" y="300" width="3" height="50" fill="#000"/>
  <rect x="193" y="300" width="1" height="50" fill="#000"/>
  <rect x="197" y="300" width="5" height="50" fill="#000"/>
  <rect x="205" y="300" width="2" height="50" fill="#000"/>
  <rect x="210" y="300" width="3" height="50" fill="#000"/>
  <rect x="216" y="300" width="1" height="50" fill="#000"/>
  <rect x="220" y="300" width="4" height="50" fill="#000"/>
  <rect x="227" y="300" width="2" height="50" fill="#000"/>
  <rect x="232" y="300" width="3" height="50" fill="#000"/>

  <text x="175" y="365" text-anchor="middle" font-size="8" fill="#000">JOB-1234-LOT-0042</text>

  <!-- Human readable info -->
  <text x="280" y="310" font-size="14" font-weight="bold" fill="#000">JOB-1234</text>
  <text x="280" y="328" font-size="11" fill="#000">Acme Corp — Widget Housing</text>
  <text x="280" y="345" font-size="10" fill="#334155">Lot: LOT-0042</text>
  <text x="280" y="360" font-size="10" fill="#334155">Qty: 250 pcs</text>
  <text x="280" y="375" font-size="12" font-weight="bold" fill="#000">Label 2 of 5</text>
  <text x="280" y="392" font-size="10" fill="#334155">Run date: 2026-03-06</text>
  <text x="280" y="407" font-size="10" fill="#334155">Due: 2026-03-20</text>

  <!-- Field descriptions -->
  <rect x="530" y="285" width="480" height="140" rx="4" fill="#f8fafc"/>
  <text x="550" y="308" font-size="11" font-weight="600" fill="#334155">Label fields:</text>
  <text x="560" y="325" font-size="10" fill="#475569">• Scannable barcode (job/run/lot encoded)</text>
  <text x="560" y="340" font-size="10" fill="#475569">• Job number (e.g., JOB-1234)</text>
  <text x="560" y="355" font-size="10" fill="#475569">• Customer name</text>
  <text x="560" y="370" font-size="10" fill="#475569">• Part / product name (human-readable ID)</text>
  <text x="560" y="385" font-size="10" fill="#475569">• Lot number (if applicable)</text>
  <text x="560" y="400" font-size="10" fill="#475569">• Quantity in this bin</text>
  <text x="560" y="415" font-size="10" fill="#334155" font-weight="600">• Label X of N (multi-bin position)</text>
  <text x="770" y="308" font-size="11" font-weight="600" fill="#334155">Dates:</text>
  <text x="780" y="325" font-size="10" fill="#475569">• Production / run date</text>
  <text x="780" y="340" font-size="10" fill="#475569">• Due date (from job card)</text>

  <!-- === BIN ASSIGNMENT FLOW === -->
  <rect x="50" y="470" width="1000" height="25" rx="4" fill="#e2e8f0"/>
  <text x="550" y="488" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">BIN ASSIGNMENT FLOW</text>

  <rect x="50" y="510" width="220" height="80" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="160" y="535" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Scan Label</text>
  <text x="160" y="555" text-anchor="middle" font-size="10" fill="#475569">Worker scans printed</text>
  <text x="160" y="570" text-anchor="middle" font-size="10" fill="#475569">barcode label</text>

  <line x1="270" y1="550" x2="310" y2="550" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="310" y="510" width="220" height="80" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="420" y="535" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Scan Bin</text>
  <text x="420" y="555" text-anchor="middle" font-size="10" fill="#475569">Worker scans destination</text>
  <text x="420" y="570" text-anchor="middle" font-size="10" fill="#475569">bin barcode</text>

  <line x1="530" y1="550" x2="570" y2="550" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="570" y="510" width="220" height="80" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="680" y="535" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">Confirm</text>
  <text x="680" y="555" text-anchor="middle" font-size="10" fill="#047857">bin_contents entry created</text>
  <text x="680" y="570" text-anchor="middle" font-size="10" fill="#047857">Movement logged</text>

  <line x1="790" y1="550" x2="830" y2="550" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="830" y="510" width="220" height="80" rx="4" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="940" y="535" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Repeat</text>
  <text x="940" y="555" text-anchor="middle" font-size="10" fill="#475569">For each label (X of N)</text>
  <text x="940" y="570" text-anchor="middle" font-size="10" fill="#475569">until all bins assigned</text>

  <!-- Multi-bin detail -->
  <rect x="50" y="610" width="1000" height="100" rx="4" fill="#fff7ed" stroke="#fb923c" stroke-width="1"/>
  <text x="550" y="635" text-anchor="middle" font-size="13" font-weight="600" fill="#9a3412">Multi-Bin Workflow (Large Orders)</text>

  <text x="80" y="660" font-size="10" fill="#475569">1. User enters total quantity (e.g., 1,250 pcs) and number of bins/labels (e.g., 5)</text>
  <text x="80" y="677" font-size="10" fill="#475569">2. System auto-divides: 250 pcs per label (user can adjust per-label quantities)</text>
  <text x="80" y="694" font-size="10" fill="#475569">3. Each printed label shows: its specific quantity and position — "Label 2 of 5 — 250 pcs"</text>
  <text x="600" y="660" font-size="10" fill="#475569">4. Labels printed → attached to containers/bins</text>
  <text x="600" y="677" font-size="10" fill="#475569">5. Each label scanned into specific bin location</text>
  <text x="600" y="694" font-size="10" fill="#475569">6. Reprint available from production run detail</text>

  <!-- Footer -->
  <text x="550" y="740" text-anchor="middle" font-size="11" fill="#64748b">Ready-to-ship items in bins surface on job cards at shipping stage. Packing slip includes bin locations for picking.</text>
</svg>