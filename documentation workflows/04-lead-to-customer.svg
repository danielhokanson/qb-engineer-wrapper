<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 550" font-family="Segoe UI, Arial, sans-serif">
  <title>Lead to Customer Conversion</title>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="550" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#0f172a">Lead to Customer Conversion</text>
  <text x="550" y="62" text-anchor="middle" font-size="13" fill="#64748b">Sales pipeline from first contact through job creation</text>

  <!-- === STATUS FLOW (top row) === -->

  <!-- New -->
  <rect x="30" y="100" width="150" height="80" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="105" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">New</text>
  <text x="105" y="145" text-anchor="middle" font-size="10" fill="#3b82f6">Lead record created</text>
  <text x="105" y="160" text-anchor="middle" font-size="10" fill="#3b82f6">Company, contacts, source</text>
  <text x="105" y="175" text-anchor="middle" font-size="10" fill="#3b82f6">Files, custom fields</text>

  <line x1="180" y1="140" x2="220" y2="140" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Contacted -->
  <rect x="220" y="100" width="150" height="80" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="295" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">Contacted</text>
  <text x="295" y="145" text-anchor="middle" font-size="10" fill="#b45309">Follow-up initiated</text>
  <text x="295" y="160" text-anchor="middle" font-size="10" fill="#b45309">Notes logged</text>
  <text x="295" y="175" text-anchor="middle" font-size="10" fill="#b45309">Follow-up reminders</text>

  <line x1="370" y1="140" x2="410" y2="140" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Quoting -->
  <rect x="410" y="100" width="170" height="80" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="495" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">Quoting</text>
  <text x="495" y="145" text-anchor="middle" font-size="10" fill="#b45309">Internal quote created</text>
  <text x="495" y="160" text-anchor="middle" font-size="10" fill="#b45309">Parts/BOM referenced</text>
  <text x="495" y="175" text-anchor="middle" font-size="10" fill="#b45309">Pricing from part catalog</text>

  <line x1="580" y1="140" x2="630" y2="140" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision: Won or Lost? -->
  <polygon points="730,100 830,140 730,180 630,140" fill="#f1f5f9" stroke="#334155" stroke-width="1.5"/>
  <text x="730" y="137" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Won or</text>
  <text x="730" y="153" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Lost?</text>

  <!-- WON path -->
  <line x1="830" y1="140" x2="880" y2="140" stroke="#059669" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="855" y="132" text-anchor="middle" font-size="10" font-weight="bold" fill="#059669">WON</text>

  <!-- Converted -->
  <rect x="880" y="100" width="190" height="80" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="975" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#065f46">Converted</text>
  <text x="975" y="145" text-anchor="middle" font-size="10" fill="#047857">→ Customer in accounting</text>
  <text x="975" y="160" text-anchor="middle" font-size="10" fill="#047857">→ Estimate created</text>
  <text x="975" y="175" text-anchor="middle" font-size="10" fill="#047857">Lead history preserved</text>

  <!-- LOST path -->
  <line x1="730" y1="180" x2="730" y2="220" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="745" y="205" font-size="10" font-weight="bold" fill="#dc2626">LOST</text>

  <rect x="640" y="220" width="180" height="70" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="730" y="245" text-anchor="middle" font-size="13" font-weight="600" fill="#991b1b">Lost</text>
  <text x="730" y="262" text-anchor="middle" font-size="10" fill="#dc2626">Reason captured:</text>
  <text x="730" y="277" text-anchor="middle" font-size="9" fill="#b91c1c">Price | Capability | Timing | Competitor | No Response</text>

  <text x="730" y="305" text-anchor="middle" font-size="10" fill="#64748b">Can be reopened later</text>

  <!-- === CONVERSION OPTIONS (bottom section) === -->
  <rect x="30" y="340" width="1040" height="30" rx="4" fill="#e2e8f0"/>
  <text x="550" y="361" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">CONVERSION OPTIONS</text>

  <!-- Option 1: Convert to Customer -->
  <rect x="50" y="390" width="300" height="100" rx="4" fill="#fff" stroke="#059669" stroke-width="1.5"/>
  <text x="200" y="415" text-anchor="middle" font-size="13" font-weight="600" fill="#065f46">Convert to Customer</text>
  <text x="200" y="440" text-anchor="middle" font-size="10" fill="#475569">Creates customer in accounting system</text>
  <text x="200" y="455" text-anchor="middle" font-size="10" fill="#475569">Links lead record → customer record</text>
  <text x="200" y="470" text-anchor="middle" font-size="10" fill="#475569">Contacts carry over</text>
  <text x="200" y="485" text-anchor="middle" font-size="10" fill="#475569">Custom field values preserved</text>

  <!-- Option 2: Convert and Create Job -->
  <rect x="400" y="390" width="300" height="100" rx="4" fill="#fff" stroke="#059669" stroke-width="1.5"/>
  <text x="550" y="415" text-anchor="middle" font-size="13" font-weight="600" fill="#065f46">Convert + Create Job</text>
  <text x="550" y="440" text-anchor="middle" font-size="10" fill="#475569">Creates customer + job card in one step</text>
  <text x="550" y="455" text-anchor="middle" font-size="10" fill="#475569">Job enters Kanban backlog or sprint</text>
  <text x="550" y="470" text-anchor="middle" font-size="10" fill="#475569">Internal quote → Estimate in accounting</text>
  <text x="550" y="485" text-anchor="middle" font-size="10" fill="#475569">Most common conversion path</text>

  <!-- Data Preserved -->
  <rect x="750" y="390" width="300" height="100" rx="4" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="900" y="415" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">What's Preserved</text>
  <text x="900" y="440" text-anchor="middle" font-size="10" fill="#475569">All lead notes &amp; activity history</text>
  <text x="900" y="455" text-anchor="middle" font-size="10" fill="#475569">All contacts (multiple per lead)</text>
  <text x="900" y="470" text-anchor="middle" font-size="10" fill="#475569">All attached files</text>
  <text x="900" y="485" text-anchor="middle" font-size="10" fill="#475569">Lead source &amp; custom field values</text>

  <!-- Footer note -->
  <text x="550" y="530" text-anchor="middle" font-size="11" fill="#64748b">Primary contact syncs to accounting system. Additional contacts live in the app. Lost leads are searchable and can be reopened.</text>
</svg>