<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 650" font-family="Segoe UI, Arial, sans-serif">
  <title>Sprint Planning — Planning Day Flow</title>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="650" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#0f172a">Sprint Planning — Planning Day Flow</text>
  <text x="550" y="62" text-anchor="middle" font-size="13" fill="#64748b">Day 1 of each sprint (default: 2-week cycles). PM/Manager/Admin curates the sprint.</text>

  <!-- Step 1: Maintenance Due -->
  <rect x="30" y="100" width="240" height="140" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="150" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b">STEP 1</text>
  <text x="150" y="140" text-anchor="middle" font-size="14" font-weight="600" fill="#991b1b">Maintenance Due</text>
  <line x1="60" y1="150" x2="240" y2="150" stroke="#fecaca" stroke-width="1"/>
  <text x="150" y="170" text-anchor="middle" font-size="10" fill="#475569">System scans asset schedules</text>
  <text x="150" y="185" text-anchor="middle" font-size="10" fill="#475569">for maintenance due this sprint</text>
  <text x="150" y="205" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">Prompts to auto-create</text>
  <text x="150" y="220" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">and assign maint. cards</text>

  <line x1="270" y1="170" x2="310" y2="170" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Carryover -->
  <rect x="310" y="100" width="240" height="140" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="430" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">STEP 2</text>
  <text x="430" y="140" text-anchor="middle" font-size="14" font-weight="600" fill="#92400e">Carryover Review</text>
  <line x1="340" y1="150" x2="520" y2="150" stroke="#fde68a" stroke-width="1"/>
  <text x="430" y="170" text-anchor="middle" font-size="10" fill="#475569">Unfinished tasks from</text>
  <text x="430" y="185" text-anchor="middle" font-size="10" fill="#475569">previous sprint listed</text>
  <text x="430" y="205" text-anchor="middle" font-size="10" font-weight="600" fill="#b45309">For each: Keep in sprint,</text>
  <text x="430" y="220" text-anchor="middle" font-size="10" font-weight="600" fill="#b45309">return to backlog, or archive</text>

  <line x1="550" y1="170" x2="590" y2="170" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Backlog Curation -->
  <rect x="590" y="100" width="240" height="140" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="710" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">STEP 3</text>
  <text x="710" y="140" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">Backlog Curation</text>
  <line x1="620" y1="150" x2="800" y2="150" stroke="#bfdbfe" stroke-width="1"/>
  <text x="710" y="170" text-anchor="middle" font-size="10" fill="#475569">Split-panel screen:</text>
  <text x="710" y="185" text-anchor="middle" font-size="10" fill="#475569">Prioritized backlog (left)</text>
  <text x="710" y="200" text-anchor="middle" font-size="10" fill="#475569">This sprint (right)</text>
  <text x="710" y="220" text-anchor="middle" font-size="10" font-weight="600" fill="#2563eb">Drag cards to commit</text>

  <line x1="830" y1="170" x2="870" y2="170" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Sprint Goals -->
  <rect x="870" y="100" width="200" height="140" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="970" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">STEP 4</text>
  <text x="970" y="140" text-anchor="middle" font-size="14" font-weight="600" fill="#065f46">Sprint Goals</text>
  <line x1="900" y1="150" x2="1040" y2="150" stroke="#bbf7d0" stroke-width="1"/>
  <text x="970" y="170" text-anchor="middle" font-size="10" fill="#475569">Optional freeform text</text>
  <text x="970" y="185" text-anchor="middle" font-size="10" fill="#475569">displayed on dashboard</text>
  <text x="970" y="200" text-anchor="middle" font-size="10" fill="#475569">for sprint duration</text>
  <text x="970" y="220" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">Sprint is now ACTIVE</text>

  <!-- === During Sprint Section === -->
  <rect x="30" y="280" width="1040" height="30" rx="4" fill="#e2e8f0"/>
  <text x="550" y="301" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">DURING THE SPRINT</text>

  <!-- Backlog -->
  <rect x="50" y="330" width="200" height="100" rx="4" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="150" y="355" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Backlog</text>
  <text x="150" y="375" text-anchor="middle" font-size="10" fill="#475569">New jobs arrive here by default</text>
  <text x="150" y="390" text-anchor="middle" font-size="10" fill="#475569">Prioritized list (drag to reorder)</text>
  <text x="150" y="405" text-anchor="middle" font-size="10" fill="#475569">Badge count in nav</text>
  <text x="150" y="420" text-anchor="middle" font-size="10" fill="#64748b">PM/Manager/Admin can curate</text>

  <!-- Dashboard -->
  <rect x="310" y="330" width="200" height="100" rx="4" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="410" y="355" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Dashboard</text>
  <text x="410" y="375" text-anchor="middle" font-size="10" fill="#475569">Sprint number &amp; day count</text>
  <text x="410" y="390" text-anchor="middle" font-size="10" fill="#475569">Sprint goals displayed</text>
  <text x="410" y="405" text-anchor="middle" font-size="10" fill="#475569">Progress tracking</text>
  <text x="410" y="420" text-anchor="middle" font-size="10" fill="#64748b">Per-role widgets</text>

  <!-- Kanban -->
  <rect x="570" y="330" width="200" height="100" rx="4" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="670" y="355" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Kanban Board</text>
  <text x="670" y="375" text-anchor="middle" font-size="10" fill="#475569">Cards flow through stages</text>
  <text x="670" y="390" text-anchor="middle" font-size="10" fill="#475569">Drag to move</text>
  <text x="670" y="405" text-anchor="middle" font-size="10" fill="#475569">Sprint-filtered view</text>
  <text x="670" y="420" text-anchor="middle" font-size="10" fill="#64748b">Track-type filtering</text>

  <!-- Mid-Sprint Add -->
  <rect x="830" y="330" width="220" height="100" rx="4" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
  <text x="940" y="355" text-anchor="middle" font-size="13" font-weight="600" fill="#9a3412">Mid-Sprint Changes</text>
  <text x="940" y="375" text-anchor="middle" font-size="10" fill="#475569">Urgent jobs can be added</text>
  <text x="940" y="390" text-anchor="middle" font-size="10" fill="#475569">mid-sprint from backlog</text>
  <text x="940" y="405" text-anchor="middle" font-size="10" fill="#475569">Flagged as "added mid-sprint"</text>
  <text x="940" y="420" text-anchor="middle" font-size="10" fill="#64748b">for reporting accuracy</text>

  <!-- === End of Sprint === -->
  <rect x="30" y="460" width="1040" height="30" rx="4" fill="#e2e8f0"/>
  <text x="550" y="481" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">END OF SPRINT</text>

  <rect x="150" y="510" width="250" height="80" rx="4" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="275" y="535" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Sprint Summary</text>
  <text x="275" y="555" text-anchor="middle" font-size="10" fill="#475569">Committed vs. completed</text>
  <text x="275" y="570" text-anchor="middle" font-size="10" fill="#475569">Carryover rate</text>
  <text x="275" y="585" text-anchor="middle" font-size="10" fill="#64748b">Velocity trend</text>

  <line x1="400" y1="550" x2="490" y2="550" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="490" y="510" width="250" height="80" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="615" y="535" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">Unfinished Items</text>
  <text x="615" y="555" text-anchor="middle" font-size="10" fill="#475569">Carry into next sprint or</text>
  <text x="615" y="570" text-anchor="middle" font-size="10" fill="#475569">return to backlog or archive</text>
  <text x="615" y="585" text-anchor="middle" font-size="10" fill="#64748b">Reviewed on next Planning Day</text>

  <line x1="740" y1="550" x2="790" y2="550" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="790" y="510" width="200" height="80" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="890" y="540" text-anchor="middle" font-size="14" font-weight="bold" fill="#065f46">Next Sprint</text>
  <text x="890" y="560" text-anchor="middle" font-size="10" fill="#047857">Planning Day begins</text>
  <text x="890" y="575" text-anchor="middle" font-size="10" fill="#047857">Cycle repeats</text>

  <!-- Footer -->
  <text x="550" y="630" text-anchor="middle" font-size="11" fill="#64748b">Sprint duration configurable (default: 2 weeks). Planning Day can be enabled/disabled. Any role with PM/Manager/Admin can curate.</text>
</svg>